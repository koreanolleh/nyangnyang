<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>냥냥 출석체크 · 스티커북</title>
<meta name="description" content="매일 출석하고 귀여운 스티커를 모아보세요.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://jqgqaityiirpheazmslv.supabase.co">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#fff4d6; --paper:#ffffff; --ink:#2b2438; --ink-soft:#6b6178;
    --coral:#ff6b5b; --coral-deep:#e0503f; --mint:#1fb6a8; --line:rgba(43,36,56,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Pretendard', -apple-system, sans-serif; line-height:1.6;
  }
  a{ color:inherit; text-decoration:none; }
  .wrap{ max-width:640px; margin:0 auto; padding:40px 20px 80px; }
  .back{ font-size:0.85rem; color:var(--ink-soft); }
  h1{ font-family:'Gaegu', sans-serif; font-size:2rem; margin:18px 0 4px; }
  .sub{ color:var(--ink-soft); font-size:0.92rem; margin:0 0 24px; }

  .checkin-card{
    background:var(--paper); border:1px solid var(--line); border-radius:22px;
    padding:28px; text-align:center; margin-bottom:24px;
  }
  .streak-num{ font-family:'Gaegu', sans-serif; font-size:3rem; color:var(--coral-deep); line-height:1; }
  .streak-label{ font-size:0.85rem; color:var(--ink-soft); margin:4px 0 20px; }
  .checkin-btn{
    background:var(--coral); color:#fff; border:none; border-radius:999px;
    padding:14px 32px; font-size:1rem; font-weight:700; cursor:pointer; font-family:'Gaegu', sans-serif;
  }
  .checkin-btn:hover{ background:var(--coral-deep); }
  .checkin-btn:disabled{ background:#ddd1c0; cursor:not-allowed; }
  .checkin-btn.done{ background:var(--mint); }

  .reveal{
    margin-top:16px; font-size:0.9rem; color:var(--ink-soft); min-height:20px;
  }
  .reveal .sticker-big{ font-size:2.4rem; display:block; margin-bottom:6px; animation:pop 0.4s ease; }
  @keyframes pop{ 0%{ transform:scale(0.4); opacity:0; } 60%{ transform:scale(1.15); } 100%{ transform:scale(1); opacity:1; } }

  .book{
    background:var(--paper); border:1px solid var(--line); border-radius:22px; padding:24px;
  }
  .book h2{ font-size:1.05rem; margin:0 0 4px; }
  .book .book-sub{ font-size:0.8rem; color:var(--ink-soft); margin:0 0 18px; }
  .sticker-grid{
    display:grid; grid-template-columns:repeat(5, 1fr); gap:10px;
  }
  .sticker-slot{
    aspect-ratio:1/1; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:1.9rem; position:relative;
  }
  .sticker-slot.collected{
    background:var(--slot-bg, #ffe1c4);
    border:3px solid #fff;
    box-shadow:0 0 0 2.5px var(--slot-ring, #ff6b5b), 0 6px 10px -4px rgba(43,36,56,0.35);
    transform:rotate(var(--rot, -4deg));
    animation:sticker-in 0.35s ease backwards;
  }
  .sticker-slot.locked{
    background:#fdf6e8; border:2px dashed #e6d9bd; font-size:1.3rem; opacity:0.55;
  }
  @keyframes sticker-in{
    0%{ transform:rotate(var(--rot, -4deg)) scale(0.5); opacity:0; }
    70%{ transform:rotate(var(--rot, -4deg)) scale(1.12); }
    100%{ transform:rotate(var(--rot, -4deg)) scale(1); opacity:1; }
  }
  @media (prefers-reduced-motion: reduce){
    .sticker-slot.collected{ animation:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .reveal .sticker-big{ animation:none; }
  }
</style>
</head>
<body>

<div class="wrap">
  <a class="back" href="index.html">← 냥냥 홈으로</a>
  <h1>📅 냥냥 출석체크</h1>
  <p class="sub">매일 한 번 출석하고 스티커를 모아보세요</p>

  <div class="checkin-card">
    <div class="streak-num" id="totalDays">-</div>
    <div class="streak-label">누적 출석 일수</div>
    <button class="checkin-btn" id="checkinBtn">오늘 출석하기</button>
    <div class="reveal" id="reveal"></div>
  </div>

  <div class="book">
    <h2>🐾 스티커북</h2>
    <p class="book-sub"><span id="collectedCount">0</span> / 20종 수집</p>
    <div class="sticker-grid" id="stickerGrid"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://jqgqaityiirpheazmslv.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_DeR9x8Vih8vCIWAeJ4Llfw_MNhpXnHJ";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const STICKERS = ['🐱','🐶','🐾','🦴','🐟','🧶','🐭','🦮','🐩','🐈','🐕','🐹','🐰','🦊','🐻','🐼','🦁','🐯','🐮','🐷'];

  function getVisitorId(){
    let vid = localStorage.getItem('nyang_vid');
    if(!vid){ vid = crypto.randomUUID(); localStorage.setItem('nyang_vid', vid); }
    return vid;
  }

  const STICKER_PALETTE = [
    { bg:'#ffe1da', ring:'#ff6b5b' }, { bg:'#d7f5f0', ring:'#1fb6a8' },
    { bg:'#e6ddff', ring:'#7c5cfc' }, { bg:'#fff1c2', ring:'#f2b134' },
    { bg:'#ffe1ee', ring:'#d46ba0' }, { bg:'#f3e3c8', ring:'#9b6b2f' },
  ];
  const ROTATIONS = [-6, 4, -3, 7, -8, 3, -4, 6];

  function renderStickerBook(collectedSet){
    document.getElementById('collectedCount').textContent = collectedSet.size;
    document.getElementById('stickerGrid').innerHTML = STICKERS.map((emoji, i) => {
      const collected = collectedSet.has(i);
      if(!collected){
        return `<div class="sticker-slot locked">🐾</div>`;
      }
      const c = STICKER_PALETTE[i % STICKER_PALETTE.length];
      const rot = ROTATIONS[i % ROTATIONS.length];
      const delay = (i % 8) * 0.04;
      return `<div class="sticker-slot collected" style="--slot-bg:${c.bg}; --slot-ring:${c.ring}; --rot:${rot}deg; animation-delay:${delay}s;">${emoji}</div>`;
    }).join('');
  }

  async function refreshStatus(){
    const { data, error } = await sb.rpc('get_my_attendance', { p_visitor_id: getVisitorId() });
    if(error || !data) return;

    document.getElementById('totalDays').textContent = data.total_days;
    renderStickerBook(new Set(data.stickers || []));

    const btn = document.getElementById('checkinBtn');
    if(data.checked_today){
      btn.textContent = '오늘 출석 완료!';
      btn.disabled = true;
      btn.classList.add('done');
    }
  }

  document.getElementById('checkinBtn').addEventListener('click', async () => {
    const btn = document.getElementById('checkinBtn');
    btn.disabled = true;
    btn.textContent = '처리 중...';

    const { data, error } = await sb.rpc('check_in', { p_visitor_id: getVisitorId() });
    if(error || !data){
      btn.disabled = false;
      btn.textContent = '오늘 출석하기';
      document.getElementById('reveal').textContent = '오류가 발생했어요. 다시 시도해주세요.';
      return;
    }

    if(data.already){
      btn.textContent = '오늘 출석 완료!';
      btn.classList.add('done');
      await refreshStatus();
      return;
    }

    const emoji = STICKERS[data.sticker];
    document.getElementById('reveal').innerHTML = `
      <span class="sticker-big">${emoji}</span>
      오늘의 스티커를 획득했어요!
    `;
    btn.textContent = '오늘 출석 완료!';
    btn.classList.add('done');
    await refreshStatus();
  });

  // 방문 통계
  (function trackVisit(){
    try{
      sb.from('page_views').insert({
        path: location.pathname, visitor_id: getVisitorId(), referrer: document.referrer || null
      }).then(()=>{}).catch(()=>{});
    }catch(e){}
  })();

  refreshStatus();
</script>
</body>
</html>
