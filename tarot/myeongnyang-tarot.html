<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멍냥타로 - 오늘의 카드 한 장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFE6D8;
    --card:#FFFBF2;
    --ink:#2E2A24;
    --ink-soft:#5B5347;
    --mustard:#C98A2C;
    --mustard-deep:#A8701D;
    --pine:#2F4F42;
    --line:#D9CBB0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(46,42,36,0.06) 1px, transparent 0);
    background-size:22px 22px;
    color:var(--ink);
    font-family:'Noto Sans KR', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:28px 14px 60px;
  }
  .app{ width:100%; max-width:460px; }
  .masthead{ text-align:center; margin-bottom:22px; }
  .masthead .kicker{
    font-size:13px; letter-spacing:2px; color:var(--mustard-deep);
    font-weight:700; text-transform:uppercase;
  }
  .masthead h1{
    font-family:'Gaegu', sans-serif; font-size:32px; line-height:1.3;
    margin:6px 0 4px; font-weight:700;
  }
  .masthead p{ font-size:14px; color:var(--ink-soft); margin:0; }

  .card{
    background:var(--card);
    border:1.5px solid var(--line);
    border-radius:18px;
    padding:26px 22px 24px;
    box-shadow:0 3px 0 var(--line);
    position:relative;
  }

  .screen{ display:none; }
  .screen.active{ display:block; }

  /* ---------- DECK / INTRO ---------- */
  .deck-wrap{
    position:relative;
    height:220px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    margin-bottom:8px;
  }
  .deck-card{
    position:absolute;
    width:110px; height:160px;
    border-radius:12px;
    background:linear-gradient(160deg, var(--pine), #24382F);
    border:2px solid #1c2b24;
    box-shadow:0 6px 14px rgba(0,0,0,0.18);
    display:flex; align-items:center; justify-content:center;
    transition:transform .25s ease;
  }
  .deck-card::after{
    content:"🐾";
    font-size:34px;
    opacity:0.35;
  }
  .deck-card.c1{ transform:rotate(-14deg) translateX(-46px); }
  .deck-card.c2{ transform:rotate(-5deg) translateX(-16px); z-index:2; }
  .deck-card.c3{ transform:rotate(5deg) translateX(16px); z-index:3; }
  .deck-card.c4{ transform:rotate(14deg) translateX(46px); }
  .deck-wrap:active .deck-card{ transform:scale(0.97) rotate(0deg) translateX(0); }

  .intro-body{
    font-size:14px; line-height:1.7; color:var(--ink-soft);
    margin:18px 0 20px; text-align:center;
  }
  .start-btn{
    width:100%; padding:15px; border:none; border-radius:12px;
    background:var(--pine); color:#fff; font-size:16px; font-weight:700;
    cursor:pointer; font-family:'Gaegu', sans-serif;
  }
  .start-btn:hover{ background:#25392F; }
  .start-btn:disabled{ background:#9aa79f; cursor:default; }
  .already-note{
    text-align:center; font-size:12.5px; color:var(--mustard-deep);
    margin-top:10px; font-weight:700;
  }

  /* ---------- DRAW / FLIP ---------- */
  .flip-wrap{
    display:flex; justify-content:center; padding:30px 0 10px;
  }
  .flip-card{
    width:180px; height:260px;
    perspective:1000px;
    cursor:pointer;
  }
  .flip-inner{
    position:relative; width:100%; height:100%;
    transition:transform .7s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d;
  }
  .flip-inner.flipped{ transform:rotateY(180deg); }
  .flip-face{
    position:absolute; inset:0; backface-visibility:hidden;
    border-radius:16px; border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .flip-back{
    background:linear-gradient(160deg, var(--pine), #24382F);
    font-size:52px; color:rgba(255,255,255,0.4);
  }
  .flip-front{
    transform:rotateY(180deg);
    background:#fff;
  }
  .flip-front img{ width:100%; height:100%; object-fit:cover; }
  .flip-hint{
    text-align:center; font-size:13px; color:var(--ink-soft); margin-top:8px;
  }

  /* ---------- RESULT ID CARD ---------- */
  .id-wrap{ display:none; }
  .id-card{
    background:var(--card);
    border:2px dashed var(--mustard-deep);
    border-radius:20px;
    padding:0; overflow:hidden;
  }
  .id-top{
    background:var(--pine); color:#fff; padding:12px 20px;
    display:flex; justify-content:space-between; align-items:center;
    font-family:'Gaegu', sans-serif; font-size:14px; letter-spacing:1px;
  }
  .id-body{ padding:22px; }
  .id-img-wrap{
    width:140px; height:140px; border-radius:16px;
    background:#FFF3DC; border:2px solid var(--mustard);
    overflow:hidden; margin:0 auto 14px;
  }
  .id-img-wrap img{ width:100%; height:100%; object-fit:cover; display:block; }
  .id-type{
    text-align:center; font-family:'Gaegu', sans-serif;
    font-size:26px; font-weight:700; margin-bottom:4px;
  }
  .id-sub{
    text-align:center; font-size:13px; color:var(--mustard-deep);
    font-weight:700; margin-bottom:16px;
  }
  .id-desc{
    font-size:14.5px; line-height:1.75; color:var(--ink);
    margin-bottom:18px; padding-bottom:18px; border-bottom:1px dashed var(--line);
  }
  .id-lucky{ display:flex; gap:8px; }
  .id-lucky-chip{
    flex:1; background:#fff; border:1px solid var(--line); border-radius:10px;
    padding:8px 10px; text-align:center; font-size:11.5px; color:var(--ink-soft);
  }
  .id-lucky-chip b{ display:block; font-size:13.5px; color:var(--ink); margin-top:2px; }

  .result-actions{ display:flex; gap:10px; margin-top:16px; }
  .btn-outline, .btn-solid{
    flex:1; padding:13px; border-radius:12px; font-size:14px; font-weight:700;
    cursor:pointer; text-align:center; border:none;
  }
  .btn-outline{ background:#fff; border:1.5px solid var(--ink); color:var(--ink); }
  .btn-solid{ background:var(--mustard-deep); color:#fff; }

  /* ---------- SHARE BOTTOM SHEET ---------- */
  .share-overlay{
    position:fixed; inset:0; z-index:200; background:rgba(46,42,36,0.55);
    display:none; align-items:flex-end; justify-content:center;
  }
  .share-overlay.show{ display:flex; }
  .share-sheet{
    width:100%; max-width:480px; background:var(--card);
    border-radius:22px 22px 0 0; padding:18px 20px 28px;
    animation:sheetUp .22s ease;
  }
  @keyframes sheetUp{ from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;} }
  .share-sheet-header{
    display:flex; align-items:center; justify-content:space-between;
    font-family:'Gaegu', sans-serif; font-size:19px; font-weight:700;
    color:var(--ink); margin-bottom:16px;
  }
  .share-sheet-header button{
    background:none; border:none; color:var(--ink-soft); font-size:17px; cursor:pointer; padding:4px 8px;
  }
  .share-preview-row{
    display:flex; align-items:center; gap:12px;
    background:#FFF3DC; border:1px solid var(--line); border-radius:14px;
    padding:10px; margin-bottom:20px;
  }
  #share-preview-thumb{ width:56px; height:70px; object-fit:cover; border-radius:8px; background:#fff; }
  .share-preview-title{ font-weight:700; color:var(--ink); font-size:14px; }
  .share-preview-sub{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  .share-icon-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px 8px; }
  .share-icon-btn{
    background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:7px;
    color:var(--ink-soft); font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .icon-circle{
    width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:22px;
  }
  .icon-kakao{ background:#FEE500; color:#3C1E1E; }
  .icon-instagram{ background:linear-gradient(135deg,#4f5bd5,#962fbf,#d62976,#fa7e1e,#feda75); }
  .icon-threads{ background:#111; color:#fff; }
  .icon-twitter{ background:#000; color:#fff; }
  .icon-save{ background:#EFE6D8; color:var(--ink); border:1px solid var(--line); }
  .icon-copytext{ background:#EFE6D8; color:var(--ink); border:1px solid var(--line); }

  .toast2{
    position:fixed; left:50%; bottom:40px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:var(--card); font-weight:600; font-size:13.5px;
    padding:12px 20px; border-radius:12px; opacity:0; pointer-events:none;
    transition:opacity .2s ease, transform .2s ease; z-index:300;
  }
  .toast2.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <div class="masthead">
    <div class="kicker">냥냥이 오늘의 운세</div>
    <h1>멍냥타로</h1>
    <p>고양이와 강아지가 뽑아주는 오늘의 카드 한 장</p>
  </div>

  <!-- INTRO / DECK -->
  <div class="screen active" id="screen-intro">
    <div class="card">
      <div class="deck-wrap" onclick="drawCard()">
        <div class="deck-card c1"></div>
        <div class="deck-card c2"></div>
        <div class="deck-card c3"></div>
        <div class="deck-card c4"></div>
      </div>
      <p class="intro-body">
        22장의 멍냥타로 카드 중 오늘의 나에게 필요한 한 장이 기다리고 있어요.<br>
        카드를 눌러서 오늘의 기운을 확인해보세요.
      </p>
      <button class="start-btn" id="drawBtn" onclick="drawCard()">오늘의 카드 뽑기 🐾</button>
      <div class="already-note" id="alreadyNote" style="display:none;">오늘은 이미 카드를 뽑았어요. 내일 다시 찾아와주세요!</div>
    </div>
  </div>

  <!-- FLIP -->
  <div class="screen" id="screen-flip">
    <div class="card" style="text-align:center;">
      <div class="flip-wrap">
        <div class="flip-card" onclick="revealCard()">
          <div class="flip-inner" id="flipInner">
            <div class="flip-face flip-back">🐾</div>
            <div class="flip-face flip-front"><img id="flipImg" alt="멍냥타로 카드"></div>
          </div>
        </div>
      </div>
      <div class="flip-hint">카드를 눌러서 뒤집어보세요</div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="id-card">
      <div class="id-top">
        <span>오늘의 멍냥타로</span>
        <span id="idNo">No. 0000</span>
      </div>
      <div class="id-body">
        <div class="id-img-wrap"><img id="idImg" alt="멍냥타로 카드 캐릭터"></div>
        <div class="id-type" id="idType">-</div>
        <div class="id-sub" id="idSub">-</div>
        <div class="id-desc" id="idDesc">-</div>
        <div class="id-lucky" id="idLucky"></div>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-outline" onclick="goHome()">메인으로</button>
      <button class="btn-solid" onclick="openShareSheet()">📤 결과 공유하기</button>
    </div>
  </div>

</div>

<div class="share-overlay" id="share-overlay">
  <div class="share-sheet">
    <div class="share-sheet-header">
      <span>결과 공유하기</span>
      <button id="share-sheet-close" aria-label="닫기">✕</button>
    </div>
    <div class="share-preview-row">
      <img id="share-preview-thumb" alt="결과 미리보기"/>
      <div>
        <div class="share-preview-title" id="share-preview-title">-</div>
        <div class="share-preview-sub">멍냥타로 · 오늘의 카드</div>
      </div>
    </div>
    <div class="share-icon-row">
      <button class="share-icon-btn" data-action="kakao">
        <span class="icon-circle icon-kakao">💬</span><span>카카오톡</span>
      </button>
      <button class="share-icon-btn" data-action="instagram">
        <span class="icon-circle icon-instagram">📷</span><span>인스타그램</span>
      </button>
      <button class="share-icon-btn" data-action="threads">
        <span class="icon-circle icon-threads">@</span><span>Threads</span>
      </button>
      <button class="share-icon-btn" data-action="twitter">
        <span class="icon-circle icon-twitter">𝕏</span><span>트위터(X)</span>
      </button>
      <button class="share-icon-btn" data-action="save">
        <span class="icon-circle icon-save">🖼</span><span>이미지 저장</span>
      </button>
      <button class="share-icon-btn" data-action="copytext">
        <span class="icon-circle icon-copytext">📋</span><span>텍스트 복사</span>
      </button>
    </div>
  </div>
</div>

<div class="toast2" id="toast2"></div>

<script>
const CARDS = [
  {id:0, name:'겁 없는 모험견', animal:'🐶', img:'images/card-00-fool.png',
   sub:'새로운 시작, 일단 저지르는 게 답',
   desc:'오늘은 계획보다 실행이 먼저인 날이에요. 망설이던 일이 있다면 가볍게 첫걸음을 떼보세요. 서투르더라도 그 자체가 새로운 기회의 문을 엽니다. 결과를 너무 걱정하지 말고 지금의 설렘을 즐겨보세요.',
   item:'새 운동화', color:'하늘색'},
  {id:1, name:'손재주 좋은 냥술사', animal:'🐱', img:'images/card-01-magician.png',
   sub:'가진 능력을 지금 다 써봐',
   desc:'이미 필요한 건 다 갖추고 있는 상태예요. 오늘은 미루던 일을 실행에 옮기기 좋은 타이밍입니다. 작은 아이디어 하나가 생각보다 큰 결과로 이어질 수 있어요. 자신감 있게 밀어붙여보세요.',
   item:'만년필', color:'노란색'},
  {id:2, name:'달빛 명상냥', animal:'🐱', img:'images/card-02-priestess.png',
   sub:'직감을 믿을 타이밍',
   desc:'논리보다 직감이 더 정확한 답을 줄 수 있는 하루예요. 조용히 혼자 생각할 시간을 가져보세요. 누군가 조언을 구해와도 성급히 답하지 말고 한 박자 쉬어가는 게 좋아요. 내면의 목소리에 귀 기울여보세요.',
   item:'캔들', color:'남색'},
  {id:3, name:'캣타워의 여왕', animal:'🐱', img:'images/card-03-empress.png',
   sub:'풍요와 편안함이 찾아옴',
   desc:'노력한 것들이 자연스럽게 결실을 맺는 흐름이에요. 주변 사람들과의 관계에서도 따뜻함이 느껴질 거예요. 스스로를 잘 돌보는 것도 오늘의 중요한 미션입니다. 여유를 갖고 하루를 누려보세요.',
   item:'꽃 한 송이', color:'로즈핑크'},
  {id:4, name:'골목 대장견', animal:'🐶', img:'images/card-04-emperor.png',
   sub:'주도권을 잡고 밀어붙일 것',
   desc:'오늘은 리더십을 발휘하기 좋은 날이에요. 결정을 미루기보다 먼저 나서서 방향을 제시해보세요. 원칙을 지키면 주변의 신뢰도 함께 따라옵니다. 자신감 있는 태도가 곧 좋은 결과로 이어질 거예요.',
   item:'손목시계', color:'버건디'},
  {id:5, name:'규율 지키는 훈련견', animal:'🐶', img:'images/card-05-hierophant.png',
   sub:'원칙과 조언을 따르면 안정',
   desc:'새로운 시도보다 검증된 방법을 따르는 게 안전한 하루예요. 믿을 만한 사람의 조언이 큰 도움이 될 수 있어요. 규칙이나 절차를 지키는 게 답답하게 느껴져도 결국 나를 지켜줍니다. 기본에 충실해보세요.',
   item:'다이어리', color:'카키'},
  {id:6, name:'츄르 나눠먹는 사이', animal:'🐱', img:'images/card-06-lovers.png',
   sub:'관계·선택의 갈림길',
   desc:'중요한 선택의 순간이 다가올 수 있어요. 머리보다 마음이 이끄는 쪽을 살펴보세요. 소중한 사람과의 관계에 솔직해지면 더 깊어질 기회예요. 두 마음 사이에서 균형을 찾는 하루가 될 거예요.',
   item:'커플 아이템', color:'코랄'},
  {id:7, name:'질주하는 승부견', animal:'🐶', img:'images/card-07-chariot.png',
   sub:'밀고 나가면 승리',
   desc:'추진력이 최고조에 달한 날이에요. 망설이던 목표가 있다면 지금이 밀어붙일 타이밍입니다. 경쟁이나 시험 같은 상황에서도 유리하게 작용해요. 방향만 확실하다면 속도는 걱정하지 마세요.',
   item:'운동화 끈', color:'레드'},
  {id:8, name:'겉바속촉 순둥견', animal:'🐶', img:'images/card-08-strength.png',
   sub:'부드러움이 힘을 이김',
   desc:'힘으로 밀어붙이기보다 부드러운 태도가 더 큰 힘을 발휘하는 하루예요. 화가 나는 상황에서도 한 박자 참으면 좋은 결과로 이어집니다. 스스로에 대한 믿음이 진짜 강함이라는 걸 기억하세요. 인내심이 빛을 발할 거예요.',
   item:'담요', color:'베이지'},
  {id:9, name:'혼자가 편한 은둔냥', animal:'🐱', img:'images/card-09-hermit.png',
   sub:'잠시 혼자만의 시간 필요',
   desc:'사람들 사이에서 지쳤다면 오늘은 혼자만의 시간을 가져보세요. 답은 바깥이 아니라 내 안에 있을 확률이 높아요. 조용히 정리하는 시간이 다음 스텝을 더 명확하게 만들어줄 거예요. 서두르지 않아도 괜찮아요.',
   item:'독서등', color:'다크그린'},
  {id:10, name:'굴러가는 공 쫓는 냥', animal:'🐱', img:'images/card-10-wheel.png',
   sub:'운의 흐름이 바뀌는 타이밍',
   desc:'정체되어 있던 상황이 갑자기 풀릴 수 있는 하루예요. 좋은 기회가 예상치 못한 곳에서 찾아올 수 있으니 주변을 잘 살펴보세요. 흐름이 바뀔 때는 유연하게 올라타는 게 중요해요. 변화를 기대해도 좋아요.',
   item:'동전', color:'골드'},

const STORAGE_KEY = 'myeongnyang-tarot-last-draw';

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function getSavedDraw(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}

function saveDraw(cardId){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({date: todayStr(), cardId, no: idNoFor(cardId)}));
  }catch(e){}
}

function idNoFor(cardId){
  return 'MN-' + String(cardId).padStart(2,'0') + '-' + String(Math.floor(Math.random()*900+100));
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// check daily limit on load
(function initCheck(){
  const saved = getSavedDraw();
  if(saved && saved.date === todayStr()){
    document.getElementById('drawBtn').disabled = true;
    document.getElementById('drawBtn').textContent = '오늘의 카드는 이미 뽑았어요';
    document.getElementById('alreadyNote').style.display = 'block';
    window._todaysCard = CARDS[saved.cardId];
    window._todaysNo = saved.no;
  }
})();

function drawCard(){
  const saved = getSavedDraw();
  let card, no;
  if(saved && saved.date === todayStr()){
    card = CARDS[saved.cardId];
    no = saved.no;
  } else {
    const idx = Math.floor(Math.random() * CARDS.length);
    card = CARDS[idx];
    no = idNoFor(idx);
    saveDraw(idx);
  }
  window._pendingCard = card;
  window._pendingNo = no;
  document.getElementById('flipImg').src = card.img;
  document.getElementById('flipInner').classList.remove('flipped');
  showScreen('screen-flip');
}

let revealed = false;
function revealCard(){
  if(revealed) return;
  revealed = true;
  document.getElementById('flipInner').classList.add('flipped');
  setTimeout(()=>{ showResult(window._pendingCard, window._pendingNo); }, 650);
}

function showResult(card, no){
  document.getElementById('idImg').src = card.img;
  document.getElementById('idType').textContent = card.animal + ' ' + card.name;
  document.getElementById('idSub').textContent = card.sub;
  document.getElementById('idDesc').textContent = card.desc;
  document.getElementById('idNo').textContent = 'No. ' + no;
  document.getElementById('idLucky').innerHTML = `
    <div class="id-lucky-chip">행운의 아이템<b>${card.item}</b></div>
    <div class="id-lucky-chip">행운의 색<b>${card.color}</b></div>
  `;
  window._lastResult = card;
  window._lastIdNo = no;
  window._shareCanvas = null;
  showScreen('screen-result');
}

function restart(){
  revealed = false;
  showScreen('screen-intro');
}

function goHome(){
  window.location.href = '../index.html';
}

/* ---------- SHARE SHEET ---------- */

function shareText(){
  const t = window._lastResult;
  if(!t) return '';
  return `[멍냥타로 오늘의 카드]\n${t.animal} ${t.name}\n${t.sub}\n\n${t.desc}\n\n👉 냥냥이에서 나도 오늘의 카드 뽑기: ${window.location.href}`;
}

function roundRectPath(cx,x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y);
  cx.arcTo(x+w,y,x+w,y+h,r);
  cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r);
  cx.arcTo(x,y,x+w,y,r);
  cx.closePath();
}

function wrapText(cx, text, x, y, maxWidth, lineHeight, maxLines){
  const words = text.split('');
  let line = '';
  let lines = 0;
  let cy = y;
  for(let i=0;i<words.length;i++){
    const test = line + words[i];
    if(cx.measureText(test).width > maxWidth && line !== ''){
      cx.fillText(line, x, cy);
      line = words[i];
      cy += lineHeight;
      lines++;
      if(maxLines && lines >= maxLines){
        cx.fillText(line.trim() + '…', x, cy);
        return cy;
      }
    } else {
      line = test;
    }
  }
  cx.fillText(line, x, cy);
  return cy;
}

function loadImageForCanvas(url){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = ()=> resolve(img);
    img.onerror = ()=> reject(new Error('image load failed'));
    img.src = url;
  });
}

async function buildShareCard(){
  const t = window._lastResult;
  const c = document.createElement('canvas');
  c.width = 600; c.height = 780;
  const cx = c.getContext('2d');

  cx.fillStyle = '#EFE6D8';
  cx.fillRect(0,0,600,780);

  roundRectPath(cx, 36,36,528,708,22);
  cx.fillStyle = '#FFFBF2';
  cx.fill();
  cx.setLineDash([9,7]);
  cx.lineWidth = 3;
  cx.strokeStyle = '#A8701D';
  cx.stroke();
  cx.setLineDash([]);

  roundRectPath(cx, 36,36,528,58,22);
  cx.fillStyle = '#2F4F42';
  cx.fill();
  cx.fillRect(36,58,528,36);
  cx.fillStyle = '#fff';
  cx.font = 'bold 20px sans-serif';
  cx.textAlign = 'left';
  cx.fillText('오늘의 멍냥타로', 60, 72);
  cx.textAlign = 'right';
  cx.fillText('No. ' + window._lastIdNo, 540, 72);

  cx.textAlign = 'center';
  roundRectPath(cx, 220,120,160,160,18);
  cx.fillStyle = '#FFF3DC';
  cx.fill();
  cx.save();
  roundRectPath(cx, 220,120,160,160,18);
  cx.clip();
  try{
    const img = await loadImageForCanvas(t.img);
    cx.drawImage(img, 220,120,160,160);
  }catch(e){
    cx.font = '64px sans-serif';
    cx.textBaseline = 'middle';
    cx.fillText(t.animal, 300, 200);
    cx.textBaseline = 'alphabetic';
  }
  cx.restore();
  cx.lineWidth = 3;
  cx.strokeStyle = '#C98A2C';
  roundRectPath(cx, 220,120,160,160,18);
  cx.stroke();

  cx.fillStyle = '#2E2A24';
  cx.font = 'bold 34px sans-serif';
  cx.fillText(t.animal + ' ' + t.name, 300, 322);

  cx.fillStyle = '#A8701D';
  cx.font = 'bold 19px sans-serif';
  cx.fillText(t.sub, 300, 352);

  cx.strokeStyle = '#D9CBB0';
  cx.lineWidth = 1;
  cx.beginPath();
  cx.moveTo(70,372); cx.lineTo(530,372); cx.stroke();

  cx.fillStyle = '#2E2A24';
  cx.font = '19px sans-serif';
  cx.textAlign = 'left';
  wrapText(cx, t.desc, 70, 408, 460, 29, 5);

  cx.fillStyle = '#5B5347';
  cx.font = 'bold 16px sans-serif';
  cx.fillText('행운의 아이템: ' + t.item + '  ·  행운의 색: ' + t.color, 70, 660);

  cx.textAlign = 'center';
  cx.fillStyle = '#5B5347';
  cx.font = '16px sans-serif';
  cx.fillText('냥냥이 · 멍냥타로 오늘의 카드', 300, 715);

  return c;
}

async function renderShareCanvas(){
  window._shareCanvas = await buildShareCard();
  try{
    document.getElementById('share-preview-thumb').src = window._shareCanvas.toDataURL('image/png');
  }catch(e){
    document.getElementById('share-preview-thumb').src = window._lastResult.img;
  }
  document.getElementById('share-preview-title').textContent = window._lastResult.animal + ' ' + window._lastResult.name;
}

async function openShareSheet(){
  await renderShareCanvas();
  document.getElementById('share-overlay').classList.add('show');
}
function closeShareSheet(){
  document.getElementById('share-overlay').classList.remove('show');
}
document.getElementById('share-overlay').addEventListener('click', (e)=>{
  if(e.target.id === 'share-overlay') closeShareSheet();
});
document.getElementById('share-sheet-close').addEventListener('click', closeShareSheet);

function showToast2(msg){
  const el = document.getElementById('toast2');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast2._timer);
  showToast2._timer = setTimeout(()=> el.classList.remove('show'), 2000);
}

async function downloadShareImage(){
  if(!window._shareCanvas) await renderShareCanvas();
  try{
    const a = document.createElement('a');
    a.download = 'myeongnyang-tarot-result.png';
    a.href = window._shareCanvas.toDataURL('image/png');
    a.click();
  }catch(e){
    showToast2('이미지 저장에 문제가 있어요. 화면 캡처로 저장해보세요!');
  }
}

function copyResultText(){
  navigator.clipboard.writeText(shareText()).then(()=>{
    showToast2('결과 텍스트가 복사됐어요!');
  }).catch(()=>{
    showToast2('복사에 실패했어요.');
  });
}

async function shareKakao(){
  if(!window.Kakao || !window.Kakao.isInitialized()){
    showToast2('카카오톡 공유는 아직 준비 중이에요.');
    return;
  }
  if(!window._shareCanvas) await renderShareCanvas();
  const pageUrl = window.location.href;
  try{
    window._shareCanvas.toBlob(blob=>{
      const file = new File([blob], 'myeongnyang-tarot-result.png', {type:'image/png'});
      window.Kakao.Share.uploadImage({ file: [file] })
        .then(res=>{
          const imageUrl = res.infos.original.url;
          window.Kakao.Share.sendDefault({
            objectType: 'feed',
            content: {
              title: '멍냥타로 오늘의 카드',
              description: `${window._lastResult.animal} ${window._lastResult.name}`,
              imageUrl: imageUrl,
              imageWidth: 600,
              imageHeight: 780,
              link: { mobileWebUrl: pageUrl, webUrl: pageUrl }
            },
            buttons: [
              { title: '나도 카드 뽑기', link: { mobileWebUrl: pageUrl, webUrl: pageUrl } }
            ]
          });
        })
        .catch(err=>{
          console.error('kakao share error:', err && err.message);
          showToast2('카카오톡 공유 중 문제가 생겼어요.');
        });
    });
  }catch(e){
    showToast2('카카오톡 공유 중 문제가 생겼어요.');
  }
}

function shareTwitter(){
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText())}`;
  window.open(url, '_blank');
}

function shareThreads(){
  const url = `https://www.threads.net/intent/post?text=${encodeURIComponent(shareText())}`;
  window.open(url, '_blank');
}

async function shareViaImageApp(appName){
  await downloadShareImage();
  showToast2(`이미지가 저장됐어요! ${appName}에 직접 업로드해보세요`);
}

document.querySelectorAll('.share-icon-btn').forEach(btn=>{
  btn.addEventListener('click', async ()=>{
    const action = btn.dataset.action;
    if(action==='kakao') await shareKakao();
    else if(action==='twitter') shareTwitter();
    else if(action==='instagram') await shareViaImageApp('인스타그램');
    else if(action==='threads') shareThreads();
    else if(action==='save'){ await downloadShareImage(); showToast2('이미지가 저장됐어요!'); }
    else if(action==='copytext') copyResultText();
  });
});
