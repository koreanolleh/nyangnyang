<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>보리의 모험</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#1b1f3a;
    --night-2:#12142a;
    --moon:#ffe9b0;
    --amber:#ffb454;
    --cream:#fff3e0;
    --tabby:#a89579;
    --tabby-dark:#5b4a37;
    --tabby-stripe:#4a3f30;
    --pink:#ff8fa3;
    --danger:#ff5d5d;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; height:100vh; overflow:hidden;
    background: var(--night-2);
    color:var(--cream);
    font-family:'Nunito', sans-serif;
    display:flex; flex-direction:column;
    user-select:none;
  }
  .display{font-family:'Jua', sans-serif;}

  #app{flex:1; display:flex; flex-direction:column; min-height:0;}
  .screen{flex:1; display:none; flex-direction:column; min-height:0;}
  .screen.active{display:flex;}

  /* START */
  #screen-start{align-items:center; justify-content:center; text-align:center; padding:24px; position:relative; background:radial-gradient(120% 90% at 50% 0%, #2a2f55 0%, var(--night) 55%, var(--night-2) 100%);}
  .moon-deco{position:absolute; top:36px; right:40px; width:70px; height:70px; border-radius:50%; background:radial-gradient(circle at 35% 32%, #fff8e0, var(--moon) 60%); box-shadow:0 0 40px rgba(255,233,176,0.5);}
  #face-canvas{width:128px; height:128px; z-index:1; margin-bottom:8px; filter:drop-shadow(0 8px 16px rgba(0,0,0,0.4));}
  .eyebrow{font-size:0.85rem; letter-spacing:0.3em; color:var(--amber); text-transform:uppercase; margin-bottom:8px; z-index:1;}
  h1.title{font-size:clamp(2.4rem, 11vw, 3.2rem); margin:0 0 8px 0; z-index:1; color:var(--cream); text-shadow:2px 3px 0 var(--tabby-dark);}
  .subtitle{font-size:1.05rem; color:#c9c4e8; margin-bottom:22px; z-index:1; max-width:300px;}
  .best-badge{z-index:1; font-size:0.95rem; color:var(--night-2); margin-bottom:20px; border-radius:999px; padding:6px 18px; background:var(--amber); font-family:'Jua';}
  .btn-primary{
    z-index:1; font-family:'Jua'; font-size:1.25rem; background:linear-gradient(180deg, #ffcf85, var(--amber));
    color:var(--night-2); border:none; border-radius:14px; padding:16px 40px;
    box-shadow:0 6px 0 #b5793a, 0 10px 18px rgba(0,0,0,0.35); cursor:pointer; transition:transform .08s;
  }
  .btn-primary:active{transform:translateY(4px); box-shadow:0 2px 0 #b5793a;}
  .howto{z-index:1; margin-top:18px; font-size:0.9rem; color:#a29ecf; max-width:290px; line-height:1.5;}

  /* GAME */
  #screen-game{position:relative; padding:0;}
  .hud{
    position:absolute; top:0; left:0; right:0; z-index:10; display:flex; justify-content:space-between; align-items:center;
    padding:12px 16px; pointer-events:none;
  }
  .hud-score{font-family:'Jua'; font-size:1.3rem; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,0.5);}
  .hud-lives{display:flex; gap:5px;}
  .hud-heart{font-size:1.2rem; filter:drop-shadow(0 2px 3px rgba(0,0,0,0.5));}
  #game-canvas{width:100%; flex:1; display:block; touch-action:none;}
  .controls{
    position:absolute; bottom:34px; left:14px; right:14px; z-index:10;
    display:flex; gap:10px;
  }
  .ctrl-btn{
    flex:1; font-family:'Jua'; font-size:1.15rem; color:#12142a;
    background:linear-gradient(180deg, #ffcf85, var(--amber));
    border:none; border-radius:14px; padding:18px 4px; text-align:center;
    box-shadow:0 6px 0 #b5793a, 0 10px 16px rgba(0,0,0,0.35);
    transition:transform 0.06s ease, box-shadow 0.06s ease;
    -webkit-user-select:none; user-select:none;
  }
  .ctrl-btn small{color:#5a3f1f; font-weight:700;}
  .ctrl-btn:active{
    transform:translateY(6px);
    box-shadow:0 0 0 #b5793a, 0 3px 6px rgba(0,0,0,0.3);
    background:linear-gradient(180deg, #ffb454, #e89a3d);
  }

  .gauge-wrap{
    position:absolute; top:48px; left:16px; right:16px; z-index:10; pointer-events:none;
  }
  .gauge-track{
    width:100%; height:10px; border-radius:6px; background:rgba(18,20,42,0.55);
    border:1px solid rgba(255,255,255,0.25); overflow:hidden;
  }
  .gauge-fill{
    height:100%; width:0%; border-radius:6px;
    background:linear-gradient(90deg, #66d1ff, #8fd6ff);
    transition:width 0.15s ease;
  }
  .gauge-track.gauge-ready{ animation: gaugeBlink 0.7s ease-in-out infinite; }
  .gauge-track.gauge-active .gauge-fill{ background:linear-gradient(90deg, #ffb454, #ff8fa3); }
  @keyframes gaugeBlink{
    0%,100%{ box-shadow:0 0 0 rgba(102,209,255,0); }
    50%{ box-shadow:0 0 14px 3px rgba(102,209,255,0.9); }
  }
  .boost-btn{
    display:none;
    background:linear-gradient(180deg, #8fe0ff, #66d1ff);
    box-shadow:0 6px 0 #2f8fb5, 0 10px 16px rgba(0,0,0,0.35);
    animation: boostPulse 0.8s ease-in-out infinite;
  }
  .boost-btn:active{
    background:linear-gradient(180deg, #66d1ff, #4bb8e6);
    box-shadow:0 0 0 #2f8fb5, 0 3px 6px rgba(0,0,0,0.3);
  }
  .boost-btn.boost-running{
    transform:translateY(6px);
    background:linear-gradient(180deg, #4bb8e6, #2f8fb5);
    box-shadow:0 0 0 #2f8fb5, 0 3px 10px rgba(0,0,0,0.3);
    animation: boostRunning 0.5s ease-in-out infinite;
  }
  @keyframes boostPulse{
    0%,100%{ filter:brightness(1); } 50%{ filter:brightness(1.18); }
  }
  @keyframes boostRunning{
    0%,100%{ filter:brightness(1); } 50%{ filter:brightness(1.35); }
  }

  /* RESULT */
  #screen-result{overflow-y:auto; padding:22px 20px 30px 20px; align-items:center; background:radial-gradient(120% 90% at 50% 0%, #2a2f55 0%, var(--night) 55%, var(--night-2) 100%);}
  .result-card{width:100%; max-width:360px; background:linear-gradient(160deg, #262a4d, var(--night-2)); border:1px solid rgba(255,180,84,0.35); border-radius:18px; padding:24px 20px; text-align:center; margin-bottom:16px;}
  .result-eyebrow{font-size:0.78rem; letter-spacing:0.25em; color:#a29ecf; text-transform:uppercase;}
  .result-number{font-family:'Jua'; font-size:3.2rem; color:var(--cream); margin:6px 0 0 0; line-height:1;}
  .result-unit{font-size:1rem; color:#a29ecf; margin-bottom:8px;}
  .result-grade{display:inline-block; font-family:'Jua'; font-size:1.05rem; color:var(--night-2); background:var(--amber); padding:6px 16px; border-radius:999px; margin:4px 0 12px 0;}
  .result-sub{font-size:0.92rem; color:#c9c4e8;}
  .result-actions{width:100%; max-width:360px; display:flex; gap:8px; margin-bottom:20px;}
  .action-btn{flex:1; font-weight:700; font-size:0.8rem; background:rgba(255,255,255,0.08); color:var(--cream); border:1px solid rgba(255,255,255,0.2); border-radius:10px; padding:12px 4px; cursor:pointer;}
  #share-preview{display:none; width:100%; max-width:270px; border-radius:14px; margin-bottom:14px; border:1px solid rgba(255,180,84,0.3);}
  .lb-box{width:100%; max-width:360px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:16px 18px; margin-bottom:14px;}
  .lb-title{font-family:'Jua'; font-size:1rem; color:var(--amber); margin-bottom:10px;}
  .lb-row{display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.08); font-size:0.92rem;}
  .lb-row:last-child{border-bottom:none;}
  .lb-rank{width:22px; font-family:'Jua'; color:#a29ecf;}
  .lb-name{flex:1; color:var(--cream); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .lb-time{font-family:'Jua'; color:var(--amber);}
  .lb-empty, .lb-loading{color:#a29ecf; font-size:0.88rem; text-align:center; padding:8px 0;}
  .submit-row{width:100%; max-width:360px; display:flex; gap:8px; margin-bottom:22px;}
  .submit-row input{flex:1; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); border-radius:10px; color:var(--cream); font-size:0.95rem; padding:0 14px;}
  .submit-row button{font-family:'Jua'; background:var(--amber); color:var(--night-2); border:none; border-radius:10px; padding:0 16px; cursor:pointer;}
  .note{font-size:0.75rem; color:#8983b8; text-align:center; max-width:300px; margin-bottom:6px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://developers.kakao.com/sdk/js/kakao.min.js"></script>
</head>
<body>
<div id="app">

  <section id="screen-start" class="screen active">
    <div class="moon-deco"></div>
    <canvas id="face-canvas" width="256" height="256"></canvas>
    <div class="eyebrow">BORI'S ADVENTURE</div>
    <h1 class="title display">보리의<br>모험</h1>
    <div class="subtitle">골목을 달리는 우리 보리. 장애물을 피하고 먹이를 모으자!</div>
    <div id="best-badge" class="best-badge" style="display:none;"></div>
    <button class="btn-primary" id="btn-start">게임 시작</button>
    <div class="howto">점프 버튼(또는 Space/↑ 키)으로 장애물을 피하세요. 생선과 사료는 몸에 닿으면 먹을 수 있어요.</div>
  </section>

  <section id="screen-game" class="screen">
    <div class="hud">
      <div class="hud-score">🏃 <span id="hud-score">0</span>m</div>
      <div class="hud-lives" id="hud-lives"></div>
    </div>
    <div class="gauge-wrap">
      <div class="gauge-track"><div class="gauge-fill" id="gauge-fill"></div></div>
    </div>
    <canvas id="game-canvas"></canvas>
    <div class="controls">
      <button class="ctrl-btn" id="btn-jump">⬆ 점프<br><small>Space / ↑</small></button>
      <button class="ctrl-btn boost-btn" id="btn-boost">🚀 부스터!</button>
    </div>
  </section>

  <section id="screen-result" class="screen">
    <div class="result-card">
      <div class="result-eyebrow">달린 거리</div>
      <div class="result-number display" id="res-number">0</div>
      <div class="result-unit">m</div>
      <div class="result-grade" id="res-grade">-</div>
      <div class="result-sub" id="res-sub">먹이 0개 획득</div>
    </div>

    <img id="share-preview" alt="결과 카드"/>

    <div class="result-actions">
      <button class="action-btn" id="btn-share">📤 공유하기</button>
      <button class="action-btn" id="btn-kakao" style="background:#FEE500; color:#3C1E1E;">💬 카톡 공유</button>
      <button class="action-btn" id="btn-save">🖼 이미지 저장</button>
    </div>

    <div class="submit-row">
      <input id="nickname" maxlength="10" placeholder="닉네임 (순위 등록)"/>
      <button id="btn-submit">등록</button>
    </div>
    <div class="note">등록한 닉네임과 기록은 이 게임을 하는 다른 모든 사람에게 순위표로 공개돼요.</div>

    <div class="lb-box">
      <div class="lb-title">🏆 전체 랭킹 TOP 10</div>
      <div id="lb-list" class="lb-loading">불러오는 중...</div>
    </div>

    <button class="btn-primary" id="btn-retry">다시 도전</button>
  </section>

</div>

  let billboardPhotoIndex = 0;

  const screens = {
    start: document.getElementById('screen-start'),
    game: document.getElementById('screen-game'),
    result: document.getElementById('screen-result'),
  };
  function showScreen(name){
    Object.values(screens).forEach(s=>s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  let W=0, H=0, GROUND_Y=0;

  function resize(){
    const rect = canvas.getBoundingClientRect();
    W = canvas.width = Math.round(rect.width);
    H = canvas.height = Math.round(rect.height);
    GROUND_Y = H * 0.66;
  }
  window.addEventListener('resize', resize);

  // ---------- Game state ----------
  let running = false;
  let distance = 0;
  let speed = 0;
  let currentSpeed = 0;
  const BASE_SPEED = 230; // px/sec
  let boostGauge = 0;      // 0-100
  let boostReady = false;  // becomes true once gauge hits 100, stays true until it drains to 0
  let boosting = false;    // true while the boost button is actively held
  let boostFlash = 0;      // brief screen flash on activation
  const BOOST_MULT = 2.4;
  const BOOST_RANGE_M = 200; // a full gauge lasts about this many meters of boosted travel
  let lives = 3;
  let maxLives = 3;
  let foodCount = 0;
  let sponsorCount = 0;
  let elapsed = 0;
  let invincible = 0;

  const cat = { x:0, y:0, vy:0, w:54, h:40, grounded:true, runPhase:0 };
  const GRAVITY = 2200;
  const JUMP_V = -820;

  let obstacles = [];
  let items = [];
  let particles = [];
  let popups = [];
  let bursts = [];
  let nextObstacleIn = 0;
  let nextItemIn = 0;

  let buildings = [];
  let billboards = [];
  let nextBillboardIn = 0;
  let groundOffset = 0;
  let mice = [];
  let nextMouseIn = 0;
  let stars = [];
  let nextStarIn = 0;
  let banner = null;

  function resetGame(){
    resize();
    distance = 0; speed = BASE_SPEED; currentSpeed = BASE_SPEED; lives = 3; maxLives = 3; foodCount=0; sponsorCount=0; elapsed=0; invincible=0;
    boostGauge = 0; boostReady = false; boosting = false; boostFlash = 0;
    updateGaugeUI();
    cat.x = W*0.22; cat.y = GROUND_Y - cat.h; cat.vy = 0; cat.grounded = true; cat.runPhase=0;
    obstacles = []; items = []; particles = []; popups = []; bursts = [];
    nextObstacleIn = 1.1; nextItemIn = 1.6;
    buildings = [];
    let bx = 0;
    while(bx < W + 200){
      buildings.push({ x:bx, w: 60+Math.random()*70, h: 60+Math.random()*130 });
      bx += buildings[buildings.length-1].w + 18 + Math.random()*30;
    }
    billboards = [];
    nextBillboardIn = 4;
    mice = []; nextMouseIn = 9 + Math.random()*6;
    stars = []; nextStarIn = 4 + Math.random()*5;
    banner = null;
    groundOffset = 0;
    renderLives();
    updateHud();
  }

  function renderLives(){
    const el = document.getElementById('hud-lives');
    el.innerHTML = '';
    for(let i=0;i<maxLives;i++){
      const s = document.createElement('span');
      s.className='hud-heart';
      s.textContent = i<lives ? '❤️' : '🖤';
      el.appendChild(s);
    }
  }
  function updateHud(){
    document.getElementById('hud-score').textContent = Math.floor(distance);
  }

  // ---------- Input ----------
  function doJump(){
    if(!running) return;
    if(cat.grounded){
      cat.vy = JUMP_V; cat.grounded = false;
      spawnPuff(cat.x+cat.w*0.3, GROUND_Y);
    }
  }
  document.getElementById('btn-jump').addEventListener('click', doJump);
  window.addEventListener('keydown', (e)=>{
    if(!screens.game.classList.contains('active')) return;
    if(e.key===' ' || e.key==='ArrowUp' || e.key==='w' || e.key==='W'){ e.preventDefault(); doJump(); }
  });

  // boost: single click/press activates it — runs automatically until the gauge fully drains
  function activateBoost(){
    if(!running || !boostReady || boostGauge<=0 || boosting) return;
    boosting = true;
    boostFlash = 1;
    updateGaugeUI();
  }
  const boostBtn = document.getElementById('btn-boost');
  boostBtn.addEventListener('click', activateBoost);
  window.addEventListener('keydown', (e)=>{
    if(!screens.game.classList.contains('active')) return;
    if(e.key==='Shift'){ activateBoost(); }
  });

  function collectItem(it, idx){
    items.splice(idx,1);
    if(it.kind==='sponsor'){
      distance += 15; sponsorCount++;
      popups.push({x:it.x, y:it.y, text:`+15m ${SPONSOR_NAME}!`, life:1.1, color:SPONSOR_COLOR, scale:0});
      addBoostGauge(10);
    } else if(it.kind==='heart'){
      if(maxLives<6) maxLives++;
      lives = Math.min(lives+1, maxLives);
      renderLives();
      popups.push({x:it.x, y:it.y, text:'생명 +1 ❤️', life:1.2, color:'#ff8fa3', scale:0});
    } else {
      distance += 3; foodCount++;
      popups.push({x:it.x, y:it.y, text:'냥! +3m', life:1.1, color:'#ffd77a', scale:0});

    }

    spawnPuff(it.x, it.y);
    updateHud();
  }

  function addBoostGauge(amount){
    if(boostGauge>=100) return;
    boostGauge = Math.min(100, boostGauge + amount);
    if(boostGauge>=100){ boostReady = true; }
    updateGaugeUI();
  }

  function updateGaugeUI(){
    const fill = document.getElementById('gauge-fill');
    const track = fill.parentElement;
    fill.style.width = boostGauge + '%';
    track.classList.toggle('gauge-ready', boostReady && !boosting);
    track.classList.toggle('gauge-active', boosting);
    const btn = document.getElementById('btn-boost');
    btn.style.display = boostReady ? 'block' : 'none';
    btn.classList.toggle('boost-running', boosting);
    btn.disabled = boosting;
  }

  function catchMouse(m, idx){
    mice.splice(idx,1);
    distance += 25; foodCount++;
    popups.push({x:m.x, y:m.y-10, text:'냥! 잡았다옹! +25m', life:1.3, color:'#ffd77a', scale:0});
    bursts.push({x:m.x, y:m.y, r:m.r, maxR:m.r+60, life:0.5, color:'#ffb454'});
    spawnPuff(m.x, m.y);
    banner = { text:'멋져! 사냥 성공 🐾', life:1.2 };
    addBoostGauge(10);
    updateHud();
  }

  function spawnPuff(x,y){
    for(let i=0;i<10;i++){
      particles.push({ x, y, vx:(Math.random()-0.5)*160, vy:-Math.random()*160, life:0.55, r:3+Math.random()*3.5 });
    }
  }

  // ---------- Spawning ----------
  function spawnObstacle(){
    const types = ['trash','cone','hydrant','slipper','pit'];
    const kind = types[Math.floor(Math.random()*types.length)];
    if(kind==='trash') obstacles.push({x:W+40, kind, w:34, h:42});
    else if(kind==='cone') obstacles.push({x:W+40, kind, w:26, h:34});
    else if(kind==='hydrant') obstacles.push({x:W+40, kind, w:24, h:36});
    else if(kind==='pit') obstacles.push({x:W+40, kind, w:58+Math.random()*22, h:12});
    else {
      obstacles.push({x:W+40, kind, w:28, h:16, spin:0});
      banner = { text:'🥿 피해!', life:1.2 };
    }
  }
  function spawnItem(){
    const roll = Math.random();
    const isSponsor = roll < 0.20;
    const isHeart = !isSponsor && roll < 0.30;
    const kind = isSponsor ? 'sponsor' : (isHeart ? 'heart' : 'fish');
    const y = isSponsor
      ? GROUND_Y - (75 + Math.random()*78)   // high: 75~153 above ground — sometimes a short hop, sometimes a full jump
      : GROUND_Y - (6 + Math.random()*32);   // low: 6~38 above ground — always reachable just by running, but varies a lot
    items.push({
      x: W+40,
      y,
      r: isSponsor? 20 : (isHeart? 22 : 13),
      kind,
      high: isSponsor
    });
  }

  // ---------- Update ----------
  let lastTs = null;
  function loop(ts){
    if(!running) return;
    if(lastTs===null) lastTs = ts;
    let dt = (ts-lastTs)/1000;
    if(dt>0.05) dt=0.05;
    lastTs = ts;
    elapsed += dt;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function update(dt){
    speed = BASE_SPEED + Math.min(elapsed*6, 180);

    // boost: while actively held and gauge remains, move faster, become invincible, and drain the gauge
    if(boosting && boostReady && boostGauge > 0){
      currentSpeed = speed * BOOST_MULT;
      const metersThisFrame = currentSpeed*dt/60;
      boostGauge = Math.max(0, boostGauge - metersThisFrame*(100/BOOST_RANGE_M));
      updateGaugeUI();
      if(boostGauge<=0){ boosting=false; boostReady=false; invincible = 1.0; updateGaugeUI(); }
    } else {
      currentSpeed = speed;
    }

    distance += currentSpeed*dt/60;
    updateHud();

    groundOffset -= currentSpeed*dt;
    buildings.forEach(b=> b.x -= currentSpeed*dt*0.35);
    if(buildings.length && buildings[0].x + buildings[0].w < -20){
      const last = buildings[buildings.length-1];
      buildings.shift();
      buildings.push({ x:last.x+last.w+18+Math.random()*30, w:60+Math.random()*70, h:60+Math.random()*130 });
    }

    // billboard (slow-moving ad sign, passes by occasionally)
    nextBillboardIn -= dt;
    if(nextBillboardIn<=0){
      billboards.push({ x: W+220, w:250, h:110, imgIndex: billboardPhotoIndex });
      billboardPhotoIndex = (billboardPhotoIndex + 1) % billboardPhotoImgs.length;
      nextBillboardIn = 9 + Math.random()*5;
    }
    billboards.forEach(b=> b.x -= currentSpeed*dt*0.35);
    billboards = billboards.filter(b=> b.x + b.w > -40);

    // surprise mouse dash — a fast bonus target that darts across the ground
    nextMouseIn -= dt;
    if(nextMouseIn<=0){
      mice.push({ x: W+30, y: GROUND_Y-9, vx: -(420+Math.random()*90), r:12, phase:0 });
      banner = { text:'🐭 찍찍!', life:1.6 };
      nextMouseIn = 20 + Math.random()*16;
    }
    mice.forEach(m=>{ m.x += m.vx*dt; m.phase += dt*22; });
    mice = mice.filter(m=> m.x > -40);

    // shooting star — pure atmosphere, keeps the night sky lively
    nextStarIn -= dt;
    if(nextStarIn<=0){
      stars.push({ x: W*0.15+Math.random()*W*0.6, y: H*0.08+Math.random()*H*0.15, life:0.9, len: 60+Math.random()*40 });
      nextStarIn = 7 + Math.random()*9;
    }
    stars.forEach(s=> s.life -= dt*1.1);
    stars = stars.filter(s=> s.life>0);

    if(banner){ banner.life -= dt*0.9; if(banner.life<=0) banner=null; }

    // cat physics
    if(!cat.grounded){
      cat.vy += GRAVITY*dt;
      cat.y += cat.vy*dt;
      if(cat.y >= GROUND_Y-cat.h){ cat.y = GROUND_Y-cat.h; cat.vy=0; cat.grounded=true; }
    }
    cat.runPhase += dt*10*(boosting?1.8:1);

    if(invincible>0) invincible -= dt;
    if(boostFlash>0) boostFlash = Math.max(0, boostFlash - dt*2.5);

    // obstacles
    nextObstacleIn -= dt;
    if(nextObstacleIn<=0){
      spawnObstacle();
      nextObstacleIn = Math.max(1.5 - elapsed*0.02, 0.7) + Math.random()*0.6;
    }
    obstacles.forEach(o=> o.x -= currentSpeed*dt);
    obstacles = obstacles.filter(o=> o.x > -80);

    // items
    nextItemIn -= dt;
    if(nextItemIn<=0){
      spawnItem();
      nextItemIn = 1.2 + Math.random()*1.4;
    }
    items.forEach(it=> it.x -= currentSpeed*dt);
    items = items.filter(it=> it.x > -60);

    // particles
    particles.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy += 400*dt; p.life -= dt; });
    particles = particles.filter(p=>p.life>0);
    popups.forEach(p=>{ p.y -= 46*dt; p.life -= dt*1.1; p.scale = Math.min((p.scale||0)+dt*6, 1); });
    popups = popups.filter(p=>p.life>0);
    bursts.forEach(b=>{ b.r += (b.maxR-b.r)*dt*8; b.life -= dt*2.2; });
    bursts = bursts.filter(b=>b.life>0);

    // item collisions (auto-eat on touch — low items caught just by running, high items need a jump)
    // skipped entirely while boosting: invincible + always-colliding would otherwise refill the gauge forever
    if(!boosting){
      const catBox = getCatBox();
      for(let i=items.length-1;i>=0;i--){
        const it = items[i];
        const ib = { x: it.x-it.r, y: it.y-it.r, w: it.r*2, h: it.r*2 };
        if(rectsOverlap(catBox, ib)){
          collectItem(it, i);
        }
      }
      for(let i=mice.length-1;i>=0;i--){
        const m = mice[i];
        const mb = { x: m.x-m.r, y: m.y-m.r, w: m.r*2, h: m.r*2 };
        if(rectsOverlap(catBox, mb)){
          catchMouse(m, i);
        }
      }
    }

    // collisions
    if(invincible<=0 && !boosting){
      const catBox = getCatBox();
      for(const o of obstacles){
        const ob = getObstacleBox(o);
        if(rectsOverlap(catBox, ob)){
          hitObstacle();
          break;
        }
      }
    }

    if(lives<=0 && running){
      endGame();
    }
  }

  function getCatBox(){
    return { x:cat.x+8, y:cat.y+4, w:cat.w-16, h:cat.h-6 };
  }
  function getObstacleBox(o){
    return { x:o.x, y: GROUND_Y-o.h, w:o.w, h:o.h };
  }
  function rectsOverlap(a,b){
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  function hitObstacle(){
    lives--; renderLives(); invincible = 1.2;
    popups.push({x:cat.x+cat.w/2, y:cat.y, text:'냐옹ᅲ', life:1, color:'#ff5d5d'});
    spawnPuff(cat.x+cat.w/2, cat.y+cat.h/2);
    document.getElementById('game-canvas').parentElement.classList.add('shake-fx');
  }

  // ---------- Draw ----------
  function draw(){
    // sky
    const grd = ctx.createLinearGradient(0,0,0,H);
    grd.addColorStop(0, '#232a55'); grd.addColorStop(0.6,'#1b1f3a'); grd.addColorStop(1,'#141731');
    ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);

    // moon
    ctx.beginPath(); ctx.fillStyle='#ffe9b0'; ctx.arc(W*0.82, H*0.14, 26, 0, Math.PI*2); ctx.fill();

    // shooting stars (atmosphere)
    stars.forEach(s=>{
      const t = 1 - Math.max(s.life,0)/0.9;
      const sx = s.x + t*s.len*1.4, sy = s.y + t*s.len*0.8;
      ctx.save();
      ctx.globalAlpha = Math.max(s.life,0);
      const grdStar = ctx.createLinearGradient(sx-s.len,sy-s.len*0.55,sx,sy);
      grdStar.addColorStop(0,'rgba(255,255,255,0)'); grdStar.addColorStop(1,'rgba(255,255,255,0.9)');
      ctx.strokeStyle = grdStar; ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(sx-s.len, sy-s.len*0.55); ctx.lineTo(sx,sy); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sx,sy,2,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });

    // buildings silhouette
    ctx.fillStyle = '#20244a';
    buildings.forEach(b=>{
      ctx.fillRect(b.x, GROUND_Y-b.h, b.w, b.h);
      ctx.fillStyle='#ffcf85'; ctx.globalAlpha=0.5;
      for(let wy=GROUND_Y-b.h+14; wy<GROUND_Y-10; wy+=22){
        for(let wx=b.x+8; wx<b.x+b.w-8; wx+=18){
          if(Math.random()<0.002) continue;
          if(((wx+wy)|0) % 3 === 0) ctx.fillRect(wx,wy,7,10);
        }
      }
      ctx.globalAlpha=1; ctx.fillStyle='#20244a';
    });

    // billboard (large, slow-moving ad sign — filled with rotating photos)
    billboards.forEach(b=>{
      const panelY = GROUND_Y - 210 - b.h;
      ctx.save();
      ctx.translate(b.x, panelY);
      // support poles
      ctx.strokeStyle = '#3a3f66'; ctx.lineWidth = 6;
      ctx.beginPath(); ctx.moveTo(b.w*0.18, b.h); ctx.lineTo(b.w*0.18, b.h+30); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(b.w*0.82, b.h); ctx.lineTo(b.w*0.82, b.h+30); ctx.stroke();
      // panel background (visible as a frame if photo hasn't loaded yet)
      ctx.fillStyle = '#ffffff';
      roundRectPath(ctx, 0,0,b.w,b.h,6); ctx.fill();

      const img = billboardPhotoImgs[b.imgIndex];
      if(img && img.loaded){
        ctx.save();
        roundRectPath(ctx, 0,0,b.w,b.h,6);
        ctx.clip();
        ctx.drawImage(img, 0, 0, b.w, b.h);
        ctx.restore();
      }

      ctx.strokeStyle = '#d6d6d6'; ctx.lineWidth = 1.5;
      roundRectPath(ctx, 0,0,b.w,b.h,6); ctx.stroke();
      // small "Ad" pill — keeps the real-ad-slot feel without covering the photo
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      roundRectPath(ctx, 8, 8, 26, 15, 3); ctx.fill();
      ctx.fillStyle = '#6b6b6b'; ctx.font = 'bold 9px Nunito, sans-serif'; ctx.textAlign='center';
      ctx.fillText('Ad', 21, 19);
      ctx.restore();
    });

    // ground
    ctx.fillStyle = '#2b2f52';
    ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth=2;
    ctx.beginPath();
    let gx = (groundOffset%40+40)%40 - 40;
    while(gx < W){ ctx.moveTo(gx,GROUND_Y+10); ctx.lineTo(gx+18,GROUND_Y+10); gx+=40; }
    ctx.stroke();

    // items
    items.forEach(it=>{
      const isHeartIt = it.kind==='heart';
      const pulse = 1 + Math.sin(elapsed*(isHeartIt?7:5) + it.x*0.05)*(isHeartIt?0.18:0.12);
      ctx.save(); ctx.translate(it.x,it.y);
      // tappable glow ring
      ctx.beginPath();
      ctx.arc(0,0, (it.r+(isHeartIt?18:14))*pulse, 0, Math.PI*2);
      ctx.strokeStyle = it.kind==='sponsor' ? 'rgba(63,143,95,0.55)' : (isHeartIt ? 'rgba(255,143,163,0.75)' : 'rgba(143,214,255,0.55)');
      ctx.lineWidth = isHeartIt ? 4 : 3; ctx.stroke();

      if(it.kind==='fish'){
        ctx.fillStyle = '#8fd6ff';
        ctx.beginPath(); ctx.ellipse(0,0,it.r*1.3,it.r*0.8,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(it.r*1.0,0); ctx.lineTo(it.r*2.0,-it.r*0.7); ctx.lineTo(it.r*2.0,it.r*0.7); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#1b1f3a'; ctx.beginPath(); ctx.arc(-it.r*0.6,-it.r*0.15,2.2,0,Math.PI*2); ctx.fill();
      } else if(it.kind==='heart'){
        const s = it.r*0.13;
        ctx.fillStyle = '#ff8fa3';
        ctx.beginPath();
        ctx.moveTo(0, s*2.2);
        ctx.bezierCurveTo(-s*5, -s*1.5, -s*2, -s*5, 0, -s*1.2);
        ctx.bezierCurveTo(s*2, -s*5, s*5, -s*1.5, 0, s*2.2);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.5)';
        ctx.beginPath(); ctx.arc(-s*1.4,-s*1.6, s*0.9, 0, Math.PI*2); ctx.fill();
      } else {
        // 츄르 (churu) treat — slim stick pack with sawtooth heat-sealed ends
        const r2 = it.r;
        ctx.save();
        ctx.rotate(-0.22);

        const L = r2*1.65, H = r2*0.4, teeth = 4, notch = H*0.4;
        function zigzagSide(xBase, y0, y1, dir){
          const pts = [];
          for(let i=0;i<=teeth;i++){
            const t = i/teeth;
            const y = y0 + t*(y1-y0);
            const peak = (i%2===1);
            pts.push([xBase + (peak?dir*notch:0), y]);
          }
          return pts;
        }
        const leftPts = zigzagSide(-L, -H, H, -1);
        const rightPts = zigzagSide(L, H, -H, 1);

        ctx.beginPath();
        ctx.moveTo(leftPts[0][0], leftPts[0][1]);
        leftPts.forEach(p=> ctx.lineTo(p[0], p[1]));
        ctx.lineTo(rightPts[0][0], rightPts[0][1]);
        rightPts.forEach(p=> ctx.lineTo(p[0], p[1]));
        ctx.closePath();

        const pouchGrad = ctx.createLinearGradient(0,-H,0,H);
        pouchGrad.addColorStop(0,'#ffffff'); pouchGrad.addColorStop(0.55,'#f5f0e6'); pouchGrad.addColorStop(1,'#e2dccf');
        ctx.fillStyle = pouchGrad;
        ctx.fill();
        ctx.strokeStyle='rgba(140,130,110,0.55)'; ctx.lineWidth=1;
        ctx.stroke();

        // brand color label band across the middle
        ctx.save();
        ctx.clip();
        ctx.fillStyle = SPONSOR_COLOR;
        ctx.fillRect(-r2*0.3, -H-2, r2*0.62, H*2+4);
        // faint printed text lines on the label (suggests packaging text, not literal words)
        ctx.strokeStyle='rgba(255,255,255,0.75)'; ctx.lineWidth=r2*0.045; ctx.lineCap='round';
        [-0.14,-0.02,0.1].forEach(dy=>{
          ctx.beginPath(); ctx.moveTo(-r2*0.18, dy*r2*2); ctx.lineTo(r2*0.18, dy*r2*2); ctx.stroke();
        });
        // subtle sheen
        ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=r2*0.16; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(-r2*1.2,-H*0.7); ctx.lineTo(-r2*0.85,-H*0.95); ctx.stroke();
        ctx.restore();

        // torn opening at the right end (ragged gap in the seal)
        ctx.fillStyle = pouchGrad;
        ctx.beginPath();
        ctx.moveTo(L-notch*0.5, -H*0.55);
        ctx.lineTo(L+notch*0.6, -H*0.15);
        ctx.lineTo(L-notch*0.2, 0);
        ctx.lineTo(L+notch*0.5, H*0.2);
        ctx.lineTo(L-notch*0.4, H*0.55);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle='rgba(140,130,110,0.5)'; ctx.lineWidth=1; ctx.stroke();

        // squeezed-out treat — wavy S-shaped strip, like the real thing
        ctx.strokeStyle = '#e6cf9e';
        ctx.lineWidth = r2*0.34; ctx.lineCap='round'; ctx.lineJoin='round';
        ctx.beginPath();
        ctx.moveTo(L+notch*0.3, 0);
        ctx.bezierCurveTo(L+r2*0.35, -r2*0.32, L+r2*0.65, r2*0.3, L+r2*0.95, -r2*0.05);
        ctx.bezierCurveTo(L+r2*1.15, -r2*0.28, L+r2*1.4, r2*0.05, L+r2*1.55, r2*0.22);
        ctx.stroke();
        // highlight on the treat strip for a moist/glossy look
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = r2*0.1;
        ctx.beginPath();
        ctx.moveTo(L+notch*0.3, -r2*0.05);
        ctx.bezierCurveTo(L+r2*0.35, -r2*0.4, L+r2*0.65, r2*0.2, L+r2*0.95, -r2*0.12);
        ctx.stroke();

        ctx.restore();
      }

      // bouncing text labels for edible items (no box, matches obstacle warning style)
      if(it.kind==='fish' || it.kind==='sponsor' || it.kind==='heart'){
        const labelBounce = Math.sin(elapsed*6 + it.x*0.05)*3;
        const ty = -it.r-22+labelBounce;
        const labelText = it.kind==='heart' ? '생명+1' : '먹어!';
        ctx.font = 'bold 12px Jua, sans-serif'; ctx.textAlign='center';
        ctx.lineWidth = 3; ctx.strokeStyle='rgba(18,20,42,0.7)'; ctx.lineJoin='round';
        ctx.strokeText(labelText, 0, ty);
        ctx.fillStyle = it.kind==='sponsor' ? SPONSOR_COLOR : (it.kind==='heart' ? '#ff8fa3' : '#8fd6ff');
        ctx.fillText(labelText, 0, ty);
      }
      ctx.restore();
    });

    // obstacles
    obstacles.forEach(o=> drawObstacle(o));

    // surprise mice (fast bonus target)
    mice.forEach(m=>{
      ctx.save(); ctx.translate(m.x, m.y);
      // motion streaks (it's fast!)
      ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=2; ctx.lineCap='round';
      for(let k=0;k<3;k++){ ctx.beginPath(); ctx.moveTo(m.r+6+k*7, -3+k*3); ctx.lineTo(m.r+16+k*7, -3+k*3); ctx.stroke(); }
      // tail
      ctx.strokeStyle='#6b5f52'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(m.r*0.6, 2); ctx.quadraticCurveTo(m.r*1.4, 6+Math.sin(m.phase)*3, m.r*1.9, 0); ctx.stroke();
      // body
      ctx.fillStyle='#8a8172';
      ctx.beginPath(); ctx.ellipse(0,0, m.r*1.05, m.r*0.72, 0, 0, Math.PI*2); ctx.fill();
      // ears
      ctx.beginPath(); ctx.arc(-m.r*0.55,-m.r*0.55, m.r*0.35, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-m.r*0.1,-m.r*0.68, m.r*0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#e0a9a5';
      ctx.beginPath(); ctx.arc(-m.r*0.55,-m.r*0.55, m.r*0.18, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-m.r*0.1,-m.r*0.68, m.r*0.15, 0, Math.PI*2); ctx.fill();
      // nose + eye
      ctx.fillStyle='#e0a9a5'; ctx.beginPath(); ctx.arc(-m.r*0.95, 0.02*m.r, m.r*0.16, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#1b1f3a'; ctx.beginPath(); ctx.arc(-m.r*0.5,-m.r*0.15, m.r*0.1, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // "잡아!" label bouncing above the mouse so it reads as catchable
      const mb = Math.sin(elapsed*7 + m.x*0.05)*4;
      ctx.save();
      ctx.translate(m.x, m.y - m.r*1.6 + mb);
      ctx.font = 'bold 12px Jua, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      const mpw = ctx.measureText('잡아!').width + 14;
      ctx.fillStyle = 'rgba(18,20,42,0.62)';
      roundRectPath(ctx, -mpw/2, -11, mpw, 22, 11); ctx.fill();
      ctx.strokeStyle = '#ffd77a'; ctx.lineWidth = 1.5;
      roundRectPath(ctx, -mpw/2, -11, mpw, 22, 11); ctx.stroke();
      ctx.fillStyle = '#ffd77a';
      ctx.fillText('잡아!', 0, 1);
      ctx.restore();
    });

    // boost visual — speed streaks, vignette and glow while dashing
    if(boosting || boostFlash>0){
      if(boosting){
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.strokeStyle = '#8fe0ff'; ctx.lineWidth = 2.5; ctx.lineCap='round';
        for(let i=0;i<16;i++){
          const sy = Math.random()*H;
          const len = 40+Math.random()*90;
          const sx = Math.random()*W;
          ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx-len, sy); ctx.stroke();
        }
        ctx.restore();
        // vignette pulse for tunnel-speed feel
        ctx.save();
        const vg = ctx.createRadialGradient(W/2,H/2, H*0.25, W/2,H/2, H*0.72);
        vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1, `rgba(10,10,30,${0.35+Math.sin(elapsed*10)*0.08})`);
        ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
        ctx.restore();
        ctx.save();
        const glowR = 34 + Math.sin(elapsed*14)*4;
        const glowGrad = ctx.createRadialGradient(cat.x+cat.w*0.4, cat.y+cat.h*0.5, 4, cat.x+cat.w*0.4, cat.y+cat.h*0.5, glowR);
        glowGrad.addColorStop(0, 'rgba(143,224,255,0.55)');
        glowGrad.addColorStop(1, 'rgba(143,224,255,0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath(); ctx.arc(cat.x+cat.w*0.4, cat.y+cat.h*0.5, glowR, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
      if(boostFlash>0){
        ctx.save();
        ctx.globalAlpha = boostFlash;
        ctx.fillStyle = '#e8f7ff';
        ctx.fillRect(0,0,W,H);
        ctx.restore();
      }
    }

    // cat
    drawCat();

    // particles
    particles.forEach(p=>{
      ctx.globalAlpha = Math.max(p.life,0);
      ctx.fillStyle = '#fff3e0';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    });

    // collect bursts
    bursts.forEach(b=>{
      ctx.globalAlpha = Math.max(b.life,0);
      ctx.strokeStyle = b.color; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
    });

    // popups
    popups.forEach(p=>{
      ctx.globalAlpha = Math.max(p.life,0);
      const sc = 0.6 + (p.scale||1)*0.6;
      ctx.save();
      ctx.translate(p.x, p.y); ctx.scale(sc, sc);
      ctx.font = 'bold 17px Jua, sans-serif'; ctx.textAlign='center';
      ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillText(p.text, 1, 1);
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, 0, 0);
      ctx.restore();
      ctx.globalAlpha = 1;
    });

    if(invincible>0 && Math.floor(elapsed*20)%2===0){
      // flicker handled by drawCat alpha below via invincible check (kept simple)
    }

    // banner announcement (surprise events)
    if(banner){
      const t = Math.max(banner.life,0);
      const slide = Math.min((1.6-t)*6, 1); // slide-in then hold
      const alpha = Math.min(t*2, 1);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = 'bold 16px Jua, sans-serif'; ctx.textAlign='center';
      const pw = ctx.measureText(banner.text).width + 32;
      const by = 60 + slide*60;
      ctx.fillStyle = 'rgba(18,20,42,0.75)';
      roundRectPath(ctx, W/2-pw/2, by, pw, 34, 17); ctx.fill();
      ctx.strokeStyle = '#ffb454'; ctx.lineWidth=2;
      roundRectPath(ctx, W/2-pw/2, by, pw, 34, 17); ctx.stroke();
      ctx.fillStyle = '#fff3e0';
      ctx.fillText(banner.text, W/2, by+22);
      ctx.restore();
    }
  }

  function roundRectPath(ctx,x,y,w,h,r){
    ctx.beginPath(); ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  function drawObstacle(o){
    ctx.save();
    if(o.kind==='trash'){
      ctx.translate(o.x, GROUND_Y-o.h);
      ctx.fillStyle='#8a8fb0'; roundRectPath(ctx,0,6,o.w,o.h-6,4); ctx.fill();
      ctx.strokeStyle='#ffb454'; ctx.lineWidth=2.5; roundRectPath(ctx,0,6,o.w,o.h-6,4); ctx.stroke();
      ctx.fillStyle='#5d6284'; ctx.fillRect(-2,0,o.w+4,8);
    } else if(o.kind==='cone'){
      ctx.translate(o.x, GROUND_Y-o.h);
      ctx.fillStyle='#ff8a3d';
      ctx.beginPath(); ctx.moveTo(o.w/2,0); ctx.lineTo(o.w,o.h); ctx.lineTo(0,o.h); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#ffb454'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(o.w/2,0); ctx.lineTo(o.w,o.h); ctx.lineTo(0,o.h); ctx.closePath(); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.fillRect(o.w*0.15,o.h*0.55,o.w*0.7,o.h*0.14);
    } else if(o.kind==='hydrant'){
      ctx.translate(o.x, GROUND_Y-o.h);
      ctx.fillStyle='#c1432a'; roundRectPath(ctx, o.w*0.15, o.h*0.15, o.w*0.7, o.h*0.85, 5); ctx.fill();
      ctx.fillStyle='#e0533b'; roundRectPath(ctx, o.w*0.1, 0, o.w*0.8, o.h*0.22, 5); ctx.fill();
      ctx.strokeStyle='#ffb454'; ctx.lineWidth=2.5; roundRectPath(ctx, o.w*0.15, o.h*0.15, o.w*0.7, o.h*0.85, 5); ctx.stroke();
      ctx.fillStyle='#8a2417';
      ctx.beginPath(); ctx.arc(0, o.h*0.5, o.w*0.16, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(o.w, o.h*0.5, o.w*0.16, 0, Math.PI*2); ctx.fill();
    } else if(o.kind==='slipper'){
      // someone's annoyed 삼선슬리퍼, thrown at the noisy street cat — tumbles as it flies in
      o.spin += 0.22;
      ctx.translate(o.x + o.w/2, GROUND_Y - o.h/2 - 4);
      // motion streaks trailing behind (it came flying in!)
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2; ctx.lineCap='round';
      for(let k=0;k<3;k++){ ctx.beginPath(); ctx.moveTo(o.w*0.7+k*8, -4+k*4); ctx.lineTo(o.w*1.1+k*8, -4+k*4); ctx.stroke(); }
      ctx.rotate(o.spin);
      // sole
      ctx.fillStyle='#3a3f55';
      roundRectPath(ctx, -o.w/2, -o.h/2, o.w, o.h, o.h*0.45); ctx.fill();
      ctx.fillStyle='#e8e2d5';
      roundRectPath(ctx, -o.w/2+2, -o.h/2+2, o.w-4, o.h-4, o.h*0.4); ctx.fill();
      // three stripes (삼선) across the strap
      ctx.strokeStyle='#1c1c24'; ctx.lineWidth=o.h*0.16; ctx.lineCap='round';
      for(const sx of [-o.w*0.16,0,o.w*0.16]){
        ctx.beginPath(); ctx.moveTo(sx-o.w*0.08,-o.h*0.5); ctx.lineTo(sx+o.w*0.08,o.h*0.5); ctx.stroke();
      }
      ctx.strokeStyle='#ffb454'; ctx.lineWidth=2; roundRectPath(ctx, -o.w/2, -o.h/2, o.w, o.h, o.h*0.45); ctx.stroke();
    } else if(o.kind==='pit'){
      // a gap in the ground — must jump clean over it
      ctx.translate(o.x, 0);
      const pitTop = GROUND_Y - 8;
      const teeth = 5;
      const grd2 = ctx.createLinearGradient(0,pitTop,0,H);
      grd2.addColorStop(0,'#0d0e1c'); grd2.addColorStop(1,'#020208');
      ctx.fillStyle = grd2;
      ctx.beginPath();
      ctx.moveTo(0, pitTop);
      for(let i=0;i<=teeth;i++){
        const t = i/teeth; const x = t*o.w; const y = pitTop + (i%2===0?0:9);
        ctx.lineTo(x,y);
      }
      ctx.lineTo(o.w, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
      // broken pavement chips along the jagged edge
      ctx.fillStyle = '#4a4f6b';
      for(let i=0;i<teeth;i+=2){
        const x = (i/teeth)*o.w;
        ctx.beginPath(); ctx.moveTo(x,pitTop); ctx.lineTo(x+o.w/teeth*0.5,pitTop+11); ctx.lineTo(x+o.w/teeth,pitTop); ctx.closePath(); ctx.fill();
      }
    }
    ctx.restore();

    // jump warning cue (bouncing chevrons + text, no button-like box)
    const topY = GROUND_Y-o.h;
    const bob1 = Math.sin(elapsed*7 + o.x*0.03)*4;
    const bob2 = Math.sin(elapsed*7 + o.x*0.03 + 0.4)*4;
    const warnText = o.kind==='slipper' ? '피해!' : '점프!';
    const warnColor = o.kind==='slipper' ? '#ff8fa3' : '#ffb454';
    ctx.save();
    ctx.translate(o.x+o.w/2, topY);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font = 'bold 15px Nunito, sans-serif';
    ctx.fillStyle = 'rgba(18,20,42,0.5)';
    ctx.fillText('︿', 1, -19+bob2+1);
    ctx.fillText('︿', 1, -10+bob1+1);
    ctx.fillStyle = warnColor;
    ctx.fillText('︿', 0, -20+bob2);
    ctx.fillText('︿', 0, -11+bob1);
    // text label — glow/outline only, no pill background
    const ty = -32+bob2;
    ctx.font = 'bold 13px Jua, sans-serif';
    ctx.lineWidth = 3.5; ctx.strokeStyle = 'rgba(18,20,42,0.75)'; ctx.lineJoin='round';
    ctx.strokeText(warnText, 0, ty);
    ctx.fillStyle = warnColor;
    ctx.fillText(warnText, 0, ty);
    ctx.restore();
  }

  function drawBoriHead(g, cx, cy, r, blink){
    // ears (rounder, softer silhouette)
    function ear(dir){
      const ex = cx + dir*r*0.52;
      g.fillStyle='#a89579';
      g.beginPath();
      g.moveTo(ex - dir*9, cy-r*0.5);
      g.quadraticCurveTo(ex + dir*1, cy-r*1.15, ex + dir*9, cy-r*0.42);
      g.quadraticCurveTo(ex, cy-r*0.55, ex - dir*9, cy-r*0.5);
      g.fill();
      g.fillStyle='#ffc9c0';
      g.beginPath();
      g.moveTo(ex - dir*4, cy-r*0.58);
      g.quadraticCurveTo(ex + dir*1, cy-r*0.92, ex + dir*5.5, cy-r*0.52);
      g.quadraticCurveTo(ex, cy-r*0.58, ex - dir*4, cy-r*0.58);
      g.fill();
    }
    ear(-1); ear(1);

    // head base (slightly wider/rounder = chibi proportions)
    g.fillStyle = '#a89579';
    g.beginPath(); g.ellipse(cx, cy, r*1.02, r*0.98, 0, 0, Math.PI*2); g.fill();

    // soft tabby stripes on forehead
    g.strokeStyle='#4a3f30'; g.lineWidth=r*0.09; g.lineCap='round'; g.globalAlpha=0.8;
    g.beginPath(); g.moveTo(cx-r*0.05, cy-r*0.8); g.lineTo(cx-r*0.05, cy-r*0.4); g.stroke();
    g.beginPath(); g.moveTo(cx-r*0.32, cy-r*0.7); g.lineTo(cx-r*0.38, cy-r*0.32); g.stroke();
    g.beginPath(); g.moveTo(cx+r*0.32, cy-r*0.7); g.lineTo(cx+r*0.38, cy-r*0.32); g.stroke();
    g.globalAlpha=1;

    // white muzzle patch
    g.fillStyle='#f5f0e8';
    g.beginPath(); g.ellipse(cx+r*0.26, cy+r*0.44, r*0.62, r*0.44, 0,0,Math.PI*2); g.fill();

    // blush
    g.fillStyle='rgba(255,150,160,0.45)';
    g.beginPath(); g.ellipse(cx+r*0.5, cy+r*0.22, r*0.16, r*0.1, 0,0,Math.PI*2); g.fill();
    g.beginPath(); g.ellipse(cx-r*0.32, cy+r*0.22, r*0.13, r*0.08, 0,0,Math.PI*2); g.fill();

    // eye — big and sparkly
    g.fillStyle='#efe9db';
    g.beginPath(); g.ellipse(cx+r*0.18, cy-r*0.02, r*0.32, r*0.34, 0,0,Math.PI*2); g.fill();
    if(blink){
      g.strokeStyle='#3a3226'; g.lineWidth=r*0.09; g.lineCap='round';
      g.beginPath(); g.moveTo(cx-r*0.06,cy-r*0.02); g.lineTo(cx+r*0.4,cy-r*0.02); g.stroke();
    } else {
      g.fillStyle='#8fb87a';
      g.beginPath(); g.ellipse(cx+r*0.2, cy+r*0.02, r*0.24, r*0.26, 0,0,Math.PI*2); g.fill();
      g.fillStyle='#1b1f3a';
      g.beginPath(); g.ellipse(cx+r*0.22, cy+r*0.04, r*0.11, r*0.22, 0,0,Math.PI*2); g.fill();
      g.fillStyle='#fff';
      g.beginPath(); g.arc(cx+r*0.12, cy-r*0.1, r*0.09,0,Math.PI*2); g.fill();
      g.beginPath(); g.arc(cx+r*0.28, cy+r*0.12, r*0.045,0,Math.PI*2); g.fill();
    }

    // small cute nose + mouth
    g.fillStyle='#ff9fa8';
    g.beginPath();
    g.moveTo(cx+r*0.44,cy+r*0.2); g.lineTo(cx+r*0.53,cy+r*0.2); g.lineTo(cx+r*0.485,cy+r*0.27);
    g.closePath(); g.fill();
    g.strokeStyle='#5a4a3a'; g.lineWidth=r*0.045; g.lineCap='round';
    g.beginPath(); g.moveTo(cx+r*0.485,cy+r*0.27); g.quadraticCurveTo(cx+r*0.55,cy+r*0.35,cx+r*0.62,cy+r*0.26); g.stroke();

    // whiskers
    g.strokeStyle='rgba(255,255,255,0.85)'; g.lineWidth=r*0.04;
    for(const wy of [-0.08,0.14,0.36]){
      g.beginPath(); g.moveTo(cx+r*0.4, cy+r*wy*0.5); g.lineTo(cx+r*1.25, cy+r*wy); g.stroke();
    }
  }

  function drawCat(){
    const y = cat.y;
    const bob = cat.grounded ? Math.sin(cat.runPhase)*2 : 0;
    ctx.save();
    ctx.translate(cat.x, y+bob);
    if(invincible>0 && Math.floor(elapsed*16)%2===0){ ctx.globalAlpha=0.4; }

    const bodyCx = cat.w*0.40, bodyCy = cat.h*0.62;
    const headCx = cat.w*0.80, headCy = cat.h*0.36;
    const headR = 20;

    // tail (fluffy, white tip)
    ctx.strokeStyle = '#8f7c62'; ctx.lineWidth=8; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(bodyCx-16, bodyCy+4);
    ctx.quadraticCurveTo(-10, cat.h*0.15 + Math.sin(cat.runPhase*1.5)*5, -20, -2+Math.sin(cat.runPhase*1.5)*4);
    ctx.stroke();
    ctx.strokeStyle='#f5f0e8'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-20, -2+Math.sin(cat.runPhase*1.5)*4); ctx.lineTo(-24,-8+Math.sin(cat.runPhase*1.5)*4); ctx.stroke();

    // legs (behind body, simple run cycle)
    if(cat.grounded){
      const legOff = Math.sin(cat.runPhase)*7;
      ctx.strokeStyle='#8f7c62'; ctx.lineWidth=6.5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(bodyCx-10, cat.h*0.82); ctx.lineTo(bodyCx-10+legOff, cat.h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bodyCx+16, cat.h*0.82); ctx.lineTo(bodyCx+16-legOff, cat.h); ctx.stroke();
    }

    // body (oval)
    ctx.fillStyle = '#a89579';
    ctx.beginPath(); ctx.ellipse(bodyCx, bodyCy, cat.w*0.30, cat.h*0.30, 0, 0, Math.PI*2); ctx.fill();
    // belly patch
    ctx.fillStyle = '#f5f0e8';
    ctx.beginPath(); ctx.ellipse(bodyCx+2, bodyCy+cat.h*0.08, cat.w*0.20, cat.h*0.18, 0, 0, Math.PI*2); ctx.fill();
    // mackerel stripes on body
    ctx.strokeStyle='#4a3f30'; ctx.lineWidth=2.5;
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.moveTo(bodyCx-6+i*9, bodyCy-cat.h*0.2); ctx.lineTo(bodyCx-10+i*9, bodyCy-cat.h*0.02); ctx.stroke(); }

    const blink = (Math.floor(elapsed*1.3)%6===0);
    drawBoriHead(ctx, headCx, headCy, headR, blink);

    ctx.globalAlpha=1;
    ctx.restore();
  }

  function drawFacePortrait(){
    const c = document.getElementById('face-canvas');
    const g = c.getContext('2d');
    g.clearRect(0,0,c.width,c.height);
    const cx = c.width/2, cy = c.height/2+14, r = c.width*0.30;

    // ears (rounder, softer, both sides)
    function ear(dir){
      const ex = cx + dir*r*0.6;
      g.fillStyle='#a89579';
      g.beginPath();
      g.moveTo(ex - dir*r*0.48, cy-r*0.5);
      g.quadraticCurveTo(ex + dir*r*0.06, cy-r*1.05, ex + dir*r*0.5, cy-r*0.4);
      g.quadraticCurveTo(ex, cy-r*0.5, ex - dir*r*0.48, cy-r*0.5);
      g.fill();
      g.fillStyle='#ffc9c0';
      g.beginPath();
      g.moveTo(ex - dir*r*0.24, cy-r*0.56);
      g.quadraticCurveTo(ex + dir*r*0.06, cy-r*0.86, ex + dir*r*0.3, cy-r*0.46);
      g.quadraticCurveTo(ex, cy-r*0.56, ex - dir*r*0.24, cy-r*0.56);
      g.fill();
    }
    ear(-1); ear(1);

    // head (round, chibi)
    g.fillStyle = '#a89579';
    g.beginPath(); g.ellipse(cx, cy, r*1.05, r, 0, 0, Math.PI*2); g.fill();

    // symmetric forehead stripes (soft)
    g.strokeStyle='#4a3f30'; g.lineWidth=r*0.08; g.lineCap='round'; g.globalAlpha=0.8;
    g.beginPath(); g.moveTo(cx, cy-r*0.82); g.lineTo(cx, cy-r*0.4); g.stroke();
    for(const dir of [-1,1]){
      g.beginPath(); g.moveTo(cx+dir*r*0.3, cy-r*0.74); g.lineTo(cx+dir*r*0.38, cy-r*0.34); g.stroke();
    }
    g.globalAlpha=1;

    // white muzzle (centered, bigger for cuteness)
    g.fillStyle='#f5f0e8';
    g.beginPath(); g.ellipse(cx, cy+r*0.46, r*0.68, r*0.46, 0,0,Math.PI*2); g.fill();

    // blush
    g.fillStyle='rgba(255,150,160,0.45)';
    for(const dir of [-1,1]){
      g.beginPath(); g.ellipse(cx+dir*r*0.62, cy+r*0.22, r*0.14, r*0.09, 0,0,Math.PI*2); g.fill();
    }

    // eyes — big and sparkly (both sides)
    for(const dir of [-1,1]){
      const ex = cx+dir*r*0.33, ey = cy-r*0.02;
      g.fillStyle='#efe9db';
      g.beginPath(); g.ellipse(ex, ey, r*0.27, r*0.3, 0,0,Math.PI*2); g.fill();
      g.fillStyle='#8fb87a';
      g.beginPath(); g.ellipse(ex, ey+r*0.02, r*0.2, r*0.23, 0,0,Math.PI*2); g.fill();
      g.fillStyle='#1b1f3a';
      g.beginPath(); g.ellipse(ex, ey+r*0.03, r*0.09, r*0.19, 0,0,Math.PI*2); g.fill();
      g.fillStyle='#fff';
      g.beginPath(); g.arc(ex-dir*r*0.07, ey-r*0.09, r*0.075, 0, Math.PI*2); g.fill();
      g.beginPath(); g.arc(ex+dir*r*0.03, ey+r*0.1, r*0.04, 0, Math.PI*2); g.fill();
    }

    // small cute nose + mouth (centered)
    g.fillStyle='#ff9fa8';
    g.beginPath();
    g.moveTo(cx-r*0.06, cy+r*0.24); g.lineTo(cx+r*0.06, cy+r*0.24); g.lineTo(cx, cy+r*0.32);
    g.closePath(); g.fill();
    g.strokeStyle='#5a4a3a'; g.lineWidth=r*0.04; g.lineCap='round';
    g.beginPath(); g.moveTo(cx, cy+r*0.32); g.lineTo(cx, cy+r*0.37); g.stroke();
    g.beginPath(); g.moveTo(cx, cy+r*0.37); g.quadraticCurveTo(cx-r*0.13, cy+r*0.46, cx-r*0.24, cy+r*0.37); g.stroke();
    g.beginPath(); g.moveTo(cx, cy+r*0.37); g.quadraticCurveTo(cx+r*0.13, cy+r*0.46, cx+r*0.24, cy+r*0.37); g.stroke();

    // whiskers (both sides)
    g.strokeStyle='rgba(255,255,255,0.9)'; g.lineWidth=r*0.032;
    for(const dir of [-1,1]){
      for(const wy of [-0.05,0.12,0.3]){
        g.beginPath(); g.moveTo(cx+dir*r*0.52, cy+r*wy*0.6); g.lineTo(cx+dir*r*1.18, cy+r*wy); g.stroke();
      }
    }
  }

  // ---------- Start / End ----------
  function startGame(){
    showScreen('game');
    requestAnimationFrame(()=>{
      resetGame();
      running = true;
      lastTs = null;
      requestAnimationFrame(loop);
    });
  }

  let lastResult = null;
  let memBest = null;

  function gradeFor(dist, food){
    if(dist < 60) return {label:'초보 길냥이', desc:'조금 더 달려보자냥!'};
    if(dist < 150) return {label:'골목 주름잡는중', desc:'점점 늘고있다냥!'};
    if(dist < 300) return {label:'나도 골목대장이냥?', desc:'베테랑 길냥이다옹!'};
    return {label:'전설의 칡 (삵인가?)', desc:'이제 거의 삵이다옹!'};
  }

  function endGame(){
    running = false;
    const dist = Math.floor(distance);
    const grade = gradeFor(dist, foodCount);
    lastResult = { dist, foodCount, sponsorCount, grade: grade.label };

    document.getElementById('res-number').textContent = dist;
    document.getElementById('res-grade').textContent = grade.label;
    document.getElementById('res-sub').textContent = `먹이 ${foodCount+sponsorCount}개 획득 (츄르 ${sponsorCount}개) · ${grade.desc}`;

    if(memBest===null || dist>memBest){ memBest = dist; updateBestBadge(); }

    shareCanvas = null;
    loadLeaderboard();
    showScreen('result');
  }

  function updateBestBadge(){
    const badge = document.getElementById('best-badge');
    if(memBest !== null){
      badge.style.display='inline-block';
      badge.textContent = '이번 세션 최고 기록: ' + memBest + 'm';
    }
  }

  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-retry').addEventListener('click', startGame);

  // ---------- Share card ----------
  function buildShareCard(){
    const c = document.createElement('canvas');
    c.width=600; c.height=760;
    const cx = c.getContext('2d');
    const grd = cx.createLinearGradient(0,0,0,760);
    grd.addColorStop(0,'#2a2f55'); grd.addColorStop(1,'#12142a');
    cx.fillStyle=grd; cx.fillRect(0,0,600,760);
    cx.strokeStyle='rgba(255,180,84,0.4)'; cx.lineWidth=3; cx.strokeRect(18,18,564,724);
    cx.textAlign='center';
    cx.fillStyle='#ffb454'; cx.font='22px sans-serif'; cx.fillText('보리의 모험', 300, 100);
    cx.fillStyle='#fff3e0'; cx.font='40px sans-serif'; cx.fillText('나의 생존 기록은?', 300, 168);
    cx.font='bold 120px sans-serif'; cx.fillText(String(lastResult.dist), 300, 320);
    cx.font='28px sans-serif'; cx.fillStyle='#a29ecf'; cx.fillText('m 달림', 300, 365);
    cx.font='bold 32px sans-serif';
    const gw = cx.measureText(lastResult.grade).width+60;
    cx.fillStyle='#ffb454'; roundRectPath(cx,300-gw/2,410,gw,56,28); cx.fill();
    cx.fillStyle='#12142a'; cx.fillText(lastResult.grade,300,447);
    cx.font='24px sans-serif'; cx.fillStyle='#c9c4e8';
    cx.fillText(`먹이 ${lastResult.foodCount+lastResult.sponsorCount}개 획득`, 300, 520);
    cx.font='18px sans-serif'; cx.fillStyle='#8983b8';
    cx.fillText('보리와 함께하는 골목 여행', 300, 700);
    return c;
  }
  let shareCanvas = null;
  function renderShareCanvas(){
    shareCanvas = buildShareCard();
    const img = document.getElementById('share-preview');
    img.src = shareCanvas.toDataURL('image/png');
    img.style.display='block';
  }
  document.getElementById('btn-share').addEventListener('click', async ()=>{
    if(!shareCanvas) renderShareCanvas();
    try{
      shareCanvas.toBlob(async blob=>{
        const file = new File([blob],'cat-adventure.png',{type:'image/png'});
        if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title:'보리의 모험', text:`나는 ${lastResult.dist}m 달렸다! (${lastResult.grade})`});
        } else {
          renderShareCanvas();
          alert('이 기기에서는 공유 시트를 지원하지 않아요. 이미지를 저장해서 공유해보세요.');
        }
      });
    }catch(e){ renderShareCanvas(); }
  });
  document.getElementById('btn-save').addEventListener('click', ()=>{
    if(!shareCanvas) renderShareCanvas();
    const a=document.createElement('a'); a.download='cat-adventure-result.png'; a.href=shareCanvas.toDataURL('image/png'); a.click();
  });

  document.getElementById('btn-kakao').addEventListener('click', ()=>{
    if(!window.Kakao || !window.Kakao.isInitialized()){
      alert('카카오톡 공유는 아직 설정 중이에요. (개발자용: KAKAO_JS_KEY를 등록하고, 카카오 디벨로퍼스 앱의 플랫폼 설정에 이 사이트 도메인을 등록해야 동작합니다.)');
      return;
    }
    if(!shareCanvas) renderShareCanvas();
    const pageUrl = window.location.href;
    shareCanvas.toBlob(blob=>{
      const file = new File([blob], 'bori-adventure-result.png', {type:'image/png'});
      window.Kakao.Share.uploadImage({ file: [file] })
        .then(res=>{
          const imageUrl = res.infos.original.url;
          window.Kakao.Share.sendDefault({
            objectType: 'feed',
            content: {
              title: '보리의 모험',
              description: `나는 ${lastResult.dist}m 달렸다! (${lastResult.grade})`,
              imageUrl: imageUrl,
              imageWidth: 600,
              imageHeight: 760,
              link: { mobileWebUrl: pageUrl, webUrl: pageUrl }
            },
            buttons: [
              { title: '나도 도전하기', link: { mobileWebUrl: pageUrl, webUrl: pageUrl } }
            ]
          });
        })
        .catch(err=>{
          console.error(err);
          alert('카카오톡 공유 중 문제가 생겼어요. 잠시 후 다시 시도해주세요.');
        });
    });
  });

  // ---------- Leaderboard (Supabase) ----------
  async function loadLeaderboard(){
    const list = document.getElementById('lb-list');
    list.className='lb-loading'; list.textContent='불러오는 중...';
    if(!sb){
      list.className='lb-empty';
      list.textContent='순위표 서버가 아직 연결되지 않았어요. (개발자용: SUPABASE_URL / SUPABASE_ANON_KEY를 설정하세요)';
      return;
    }
    try{
      const { data, error } = await sb
        .from('leaderboard')
        .select('name, dist')
        .order('dist', { ascending: false })
        .limit(10);
      if(error) throw error;
      if(!data || data.length===0){
        list.className='lb-empty'; list.textContent='아직 등록된 기록이 없어요. 첫 랭커가 되어보세요!'; return;
      }
      list.className='';
      list.innerHTML = data.map((e,i)=>`
        <div class="lb-row">
          <div class="lb-rank">${i+1}</div>
          <div class="lb-name">${escapeHtml(e.name||'익명')}</div>
          <div class="lb-time">${e.dist}m</div>
        </div>
      `).join('');
    }catch(e){
      console.error(e);
      list.className='lb-empty'; list.textContent='랭킹을 불러오지 못했어요.';
    }
  }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  document.getElementById('btn-submit').addEventListener('click', async ()=>{
    if(!lastResult){ return; }
    const nameInput = document.getElementById('nickname');
    const name = (nameInput.value||'익명').trim().slice(0,10) || '익명';
    const payload = { name, dist:lastResult.dist, food:lastResult.foodCount+lastResult.sponsorCount, grade:lastResult.grade };
    const btn = document.getElementById('btn-submit');
    if(!sb){
      alert('순위표 서버가 아직 연결되지 않았어요. (개발자용: Supabase 키를 설정하세요)');
      return;
    }
    btn.disabled=true; btn.textContent='등록 중...';
    try{
      const { error } = await sb.from('leaderboard').insert(payload);
      if(error) throw error;
      nameInput.value=''; btn.textContent='등록 완료!'; await loadLeaderboard();
    }catch(e){
      console.error(e);
      btn.textContent='실패, 다시 시도';
    }
    setTimeout(()=>{ btn.disabled=false; btn.textContent='등록'; }, 1500);
  });

  resize();
  drawFacePortrait();
})();
</script>
</body>
</html>
