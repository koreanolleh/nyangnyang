<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문의 · 냥냥</title>
<meta name="description" content="냥냥 사이트 운영자에게 문의하는 방법입니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#fff4d6; --paper:#ffffff; --ink:#2b2438; --ink-soft:#6b6178;
    --coral:#ff6b5b; --coral-deep:#e0503f; --line:rgba(43,36,56,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Pretendard', -apple-system, sans-serif; line-height:1.7;
  }
  .wrap{ max-width:640px; margin:0 auto; padding:56px 20px 80px; }
  a{ color:var(--coral-deep); }
  .back{ font-size:0.85rem; color:var(--ink-soft); text-decoration:none; }
  h1{ font-family:'Gaegu', sans-serif; font-size:2.1rem; margin:20px 0 24px; }
  .card{ background:var(--paper); border:1px solid var(--line); border-radius:20px; padding:28px; margin-bottom:16px; }
  .card h2{ font-size:1.05rem; margin:0 0 10px; }
  .card p{ margin:0; color:var(--ink-soft); font-size:0.95rem; }
  .mail-btn{
    display:inline-block; margin-top:14px; background:var(--coral); color:#fff;
    padding:10px 20px; border-radius:999px; text-decoration:none; font-weight:700; font-size:0.9rem;
  }
  .mail-btn:hover{ background:var(--coral-deep); }
  footer{ margin-top:40px; text-align:center; font-size:0.8rem; color:var(--ink-soft); }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← 냥냥 홈으로</a>
  <h1>🐾 문의하기</h1>

  <div class="card">
    <h2>연락 방법</h2>
    <p>콘텐츠 제안, 오류 제보, 광고/제휴 문의 등은 아래 이메일로 연락해 주세요. 확인 후 순차적으로 답변드립니다.</p>
    <a class="mail-btn" href="mailto:koreanolleh@naver.com">이메일 보내기</a>
  </div>

  <div class="card">
    <h2>주로 받는 문의</h2>
    <p>퀴즈/게임 오류 신고, 새 콘텐츠 아이디어 제안, 개인정보처리방침 관련 문의 등을 환영합니다.</p>
  </div>

  <footer>
    <a href="about.html">소개</a> · <a href="privacy.html">개인정보처리방침</a>
  </footer>
</div>
</body>
</html>
